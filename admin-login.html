<meta charset="utf-8">
<title>Command Center sign in — Buinee</title>
<meta name="description" content="Platform owner sign in for Buinee.">
<style>
  :root {
    --paper: #0e1015; --surface: #171a22; --surface-2: #1d212b;
    --line: #2a2f3b; --line-strong: #3a4050;
    --ink: #eef0f4; --ink-2: #b9bdc9; --ink-3: #82879a;
    --violet: #0e5d57; --violet-deep: #0a4340; --violet-soft: #10312e;
    --bad: #e07a68; --bad-soft: #341714;
    --radius: 14px;
    --shadow-lg: 0 30px 80px rgba(0,0,0,.55);
    --sans: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
  }
  /* This page is deliberately always dark, regardless of the visitor's
     system theme or the theme toggle used elsewhere on the site — a fixed,
     distinct look reinforces that this is a separate, restricted entry
     point, not just another themed page in the company product. */

  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--paper); color: var(--ink);
    font-family: var(--sans); font-size: 16px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
  }
  a { color: inherit; }
  h1 { margin: 0; font-weight: 600; letter-spacing: -.02em; }
  p { margin: 0; }
  button, input { font-family: inherit; font-size: inherit; }
  :focus-visible { outline: 2px solid var(--violet); outline-offset: 2px; border-radius: 4px; }

  header { padding: 26px 32px; }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 8px; flex: none; display: grid; place-items: center;
    background: linear-gradient(140deg, var(--violet), var(--violet-deep)); color: #fff;
  }
  .brand .mark svg { width: 16px; height: 16px; }
  .brand .name { font-family: var(--serif); font-size: 19px; font-weight: 600; }
  .brand .tag {
    font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--violet); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--violet);
    margin-left: 4px;
  }

  main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px 20px 80px; }
  .card {
    width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 30px 28px 26px;
  }
  .eyebrow { font-size: 11.5px; letter-spacing: .13em; text-transform: uppercase; font-weight: 700; color: var(--violet); }
  .card h1 { font-family: var(--serif); font-size: 24px; margin: 8px 0 6px; }
  .card .lede { font-size: 13.5px; color: var(--ink-3); margin-bottom: 20px; }

  form { display: flex; flex-direction: column; gap: 15px; }
  label { font-size: 13px; font-weight: 600; color: var(--ink-2); display: flex; flex-direction: column; gap: 6px; }
  input[type=email], input[type=password] {
    padding: 10px 12px; border-radius: 9px; border: 1px solid var(--line-strong);
    background: var(--surface-2); color: var(--ink); font-weight: 400;
  }
  input:focus { border-color: var(--violet); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    padding: 11px 20px; border-radius: 10px; font-size: 15px; font-weight: 600;
    text-decoration: none; border: 1px solid transparent; cursor: pointer;
    transition: background .14s; width: 100%; background: var(--violet); color: #fff;
  }
  .btn:hover { background: var(--violet-deep); }
  .btn:disabled { opacity: .6; cursor: default; }

  .msg { font-size: 13.5px; padding: 10px 13px; border-radius: 9px; display: none; }
  .msg.show { display: block; }
  .msg.error { background: var(--bad-soft); color: var(--bad); }

  .foot-link { text-align: center; font-size: 13px; color: var(--ink-3); margin-top: 18px; }
  .foot-link a { color: var(--violet); font-weight: 600; text-decoration: none; }
</style>

<header>
  <a class="brand" href="/">
    <span class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h11"/></svg>
    </span>
    <span class="name">Buinee</span>
    <span class="tag">Command Center</span>
  </a>
</header>

<main>
  <div class="card">
    <span class="eyebrow">Platform owner</span>
    <h1>Sign in</h1>
    <p class="lede">This is separate from company sign-in — it isn't a company role, it's the whole platform.</p>
    <form onsubmit="return submitLogin(event)">
      <div class="msg error" id="loginError"></div>
      <label>Email
        <input type="email" id="email" required autocomplete="email" placeholder="you@buinee.example">
      </label>
      <label>Password
        <input type="password" id="password" required autocomplete="current-password" placeholder="Your password">
      </label>
      <button class="btn" type="submit" id="submitBtn">Sign in</button>
    </form>
    <div class="foot-link">Not the platform owner? <a href="/login.html">Go to company sign-in</a>.</div>
  </div>
</main>

<script>
  async function submitLogin(ev) {
    ev.preventDefault();
    const errEl = document.getElementById('loginError');
    errEl.classList.remove('show');
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || 'Could not sign in.';
        errEl.classList.add('show');
        return false;
      }
      location.href = '/admin.html';
    } catch {
      errEl.textContent = 'Could not reach the server.';
      errEl.classList.add('show');
    } finally {
      btn.disabled = false; btn.textContent = 'Sign in';
    }
    return false;
  }
</script>
