<meta charset="utf-8">
<title>Site Contents — Command Center — Buinee</title>
<meta name="description" content="Edit the text shown on the public landing, register, login and legal pages.">
<style>
  :root {
    --paper: #f6f4ef; --surface: #ffffff; --surface-2: #efece5;
    --line: #dedad0; --line-strong: #c9c4b7;
    --ink: #101619; --ink-2: #3c4750; --ink-3: #6a747c; --ink-4: #949ba1;
    --teal: #0e5d57; --teal-deep: #0a4340; --teal-soft: #dfece9;
    --ochre: #c0611c; --ochre-soft: #f8ead9;
    --good: #2c7a51; --good-soft: #dff0e6; --warn: #b07d1b; --warn-soft: #f8eed6;
    --bad: #b0301f; --bad-soft: #fbe6e2;
    --violet: #0e5d57; --violet-soft: #dfece9;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(16,22,25,.05), 0 14px 34px rgba(16,22,25,.07);
    --sans: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --mono: "SFMono-Regular", ui-monospace, "Cascadia Code", Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #0e1315; --surface: #151b1e; --surface-2: #1c2427; --line: #262f33;
      --line-strong: #354046; --ink: #eef1f0; --ink-2: #bcc5c7; --ink-3: #8b9599; --ink-4: #6b7478;
      --teal: #4fb3a6; --teal-deep: #6fcbbd; --teal-soft: #10312e;
      --ochre: #e0913f; --ochre-soft: #2e2113;
      --good: #4bb37c; --good-soft: #12291d; --warn: #d09b3c; --warn-soft: #2a2113;
      --bad: #e07a68; --bad-soft: #341714;
      --violet: #4fb3a6; --violet-soft: #10312e;
      --shadow: 0 1px 2px rgba(0,0,0,.5), 0 14px 34px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="dark"] {
    --paper: #0e1315; --surface: #151b1e; --surface-2: #1c2427; --line: #262f33;
    --line-strong: #354046; --ink: #eef1f0; --ink-2: #bcc5c7; --ink-3: #8b9599; --ink-4: #6b7478;
    --teal: #4fb3a6; --teal-deep: #6fcbbd; --teal-soft: #10312e;
    --ochre: #e0913f; --ochre-soft: #2e2113;
    --good: #4bb37c; --good-soft: #12291d; --warn: #d09b3c; --warn-soft: #2a2113;
    --bad: #e07a68; --bad-soft: #341714;
    --violet: #4fb3a6; --violet-soft: #10312e;
    --shadow: 0 1px 2px rgba(0,0,0,.5), 0 14px 34px rgba(0,0,0,.4);
  }
  :root[data-theme="light"] {
    --paper: #f6f4ef; --surface: #ffffff; --surface-2: #efece5; --line: #dedad0;
    --line-strong: #c9c4b7; --ink: #101619; --ink-2: #3c4750; --ink-3: #6a747c; --ink-4: #949ba1;
    --teal: #0e5d57; --teal-deep: #0a4340; --teal-soft: #dfece9;
    --ochre: #c0611c; --ochre-soft: #f8ead9;
    --good: #2c7a51; --good-soft: #dff0e6; --warn: #b07d1b; --warn-soft: #f8eed6;
    --bad: #b0301f; --bad-soft: #fbe6e2;
    --violet: #0e5d57; --violet-soft: #dfece9;
    --shadow: 0 1px 2px rgba(16,22,25,.05), 0 14px 34px rgba(16,22,25,.07);
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  h1,h2,h3 { margin: 0; font-weight: 600; letter-spacing: -.02em; }
  p { margin: 0; }
  button, input, textarea { font-family: inherit; font-size: inherit; }
  :focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; border-radius: 4px; }

  .shell { display: flex; height: 100vh; height: 100dvh; }
  .sidebar {
    width: 232px; flex: none; background: var(--surface); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; padding: 20px 14px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; padding: 0 8px; }
  .sidebar-brand .mark { width: 30px; height: 30px; border-radius: 8px; flex: none; display: grid; place-items: center; background: linear-gradient(140deg, var(--violet), #0a4340); color: #fff; }
  .sidebar-brand .mark svg { width: 16px; height: 16px; }
  .sidebar-brand .name { font-family: var(--serif); font-size: 18px; font-weight: 600; }
  .sidebar-tag { font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--violet); padding: 3px 8px; margin: 6px 0 18px; }
  .sidebar-nav { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .sidebar-link {
    display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 9px;
    font-size: 14px; font-weight: 600; color: var(--ink-2); text-decoration: none; cursor: pointer;
    border: none; background: none; width: 100%; text-align: left;
  }
  .sidebar-link svg { width: 17px; height: 17px; flex: none; }
  .sidebar-link:hover { background: var(--surface-2); color: var(--ink); }
  .sidebar-link.active { background: var(--violet-soft); color: var(--violet); }
  .sidebar-foot { border-top: 1px solid var(--line); margin-top: 10px; padding-top: 10px; display: flex; flex-direction: column; gap: 3px; }

  .content { flex: 1; min-width: 0; }
  main { padding: 40px 0 70px; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 0 28px; }
  .hero-line { margin-bottom: 20px; }
  .hero-line .eyebrow { font-size: 11.5px; letter-spacing: .13em; text-transform: uppercase; font-weight: 700; color: var(--violet); }
  .hero-line h1 { font-family: var(--serif); font-size: 26px; margin: 8px 0 6px; }
  .hero-line p { font-size: 14.5px; color: var(--ink-2); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 8px 15px; border-radius: 9px; font-size: 13.5px; font-weight: 600;
    text-decoration: none; border: 1px solid var(--line-strong); cursor: pointer;
    background: var(--surface); color: var(--ink); white-space: nowrap;
  }
  .btn:hover { border-color: var(--violet); color: var(--violet); }
  .btn.primary { background: var(--violet); color: #fff; border-color: transparent; }
  .btn.primary:hover { background: var(--teal-deep); }
  .btn.primary:disabled { opacity: .6; cursor: default; }

  .page-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .page-tab {
    padding: 8px 14px; border-radius: 20px; border: 1px solid var(--line-strong); background: var(--surface);
    color: var(--ink-2); font-size: 13.5px; font-weight: 600; cursor: pointer;
  }
  .page-tab.active { background: var(--violet); border-color: transparent; color: #fff; }

  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px 24px; }
  .panel + .panel { margin-top: 14px; }
  .panel summary { font-size: 14.5px; font-weight: 600; cursor: pointer; list-style: none; }
  .panel summary::-webkit-details-marker { display: none; }
  .panel summary:before { content: '▸'; display: inline-block; margin-right: 8px; color: var(--ink-4); transition: transform .12s; }
  .panel[open] summary:before { transform: rotate(90deg); }
  .panel .fields { display: flex; flex-direction: column; gap: 14px; margin-top: 16px; }

  label { font-size: 12.5px; font-weight: 600; color: var(--ink-2); display: flex; flex-direction: column; gap: 6px; }
  input[type=text], textarea {
    padding: 9px 11px; border-radius: 9px; border: 1px solid var(--line-strong);
    background: var(--paper); color: var(--ink); font-weight: 400; font-size: 13.5px; resize: vertical;
  }
  textarea.mono { font-family: var(--mono); font-size: 12px; }
  input:focus, textarea:focus { border-color: var(--violet); }
  .hint { font-size: 11px; color: var(--ink-3); font-weight: 400; }
  .readonly-value { padding: 9px 11px; border-radius: 9px; background: var(--surface-2); color: var(--ink-2); font-size: 13.5px; white-space: pre-wrap; }

  .save-bar { position: sticky; bottom: 0; margin-top: 18px; padding: 14px 0; background: var(--paper); display: flex; align-items: center; gap: 12px; }
  .msg { font-size: 13.5px; padding: 9px 13px; border-radius: 9px; display: none; }
  .msg.show { display: block; }
  .msg.error { background: var(--bad-soft); color: var(--bad); }
  .msg.ok { background: var(--good-soft); color: var(--good); }

  #loading { padding: 80px 0; text-align: center; color: var(--ink-3); font-size: 14px; }
  .readonly-banner { padding: 12px 14px; border-radius: 10px; background: var(--surface-2); color: var(--ink-2); font-size: 12.5px; margin-bottom: 18px; }

  @media (max-width: 640px) {
    .sidebar { width: 64px; padding: 16px 8px; }
    .sidebar-brand { justify-content: center; padding: 0; }
    .sidebar-brand .name, .sidebar-tag, .sidebar-link .label { display: none; }
    .sidebar-link { justify-content: center; padding: 10px; }
  }
</style>

<div class="shell">
  <aside class="sidebar">
    <a class="sidebar-brand" href="/admin">
      <span class="mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h11"/></svg></span>
      <span class="name">Buinee</span>
    </a>
    <div class="sidebar-tag">Command Center</div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-foot">
      <button class="sidebar-link" onclick="toggleTheme()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <span class="label">Toggle theme</span>
      </button>
      <button class="sidebar-link" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        <span class="label">Sign out</span>
      </button>
    </div>
  </aside>

  <div class="content">
    <main>
      <div class="wrap">
        <div id="loading">Loading…</div>
        <div id="content" style="display:none">
          <div class="hero-line">
            <span class="eyebrow">Site contents</span>
            <h1>Edit your public pages</h1>
            <p>Every headline, paragraph and button label on the landing, register, login and legal pages — changes go live immediately.</p>
          </div>

          <div class="page-tabs" id="pageTabs"></div>
          <div id="readonlyBanner" class="readonly-banner" style="display:none">Only the owner can edit site contents. You can view the current text below.</div>
          <div id="fieldPanels"></div>

          <div class="save-bar" id="saveBar" style="display:none">
            <button class="btn primary" type="button" id="saveBtn" onclick="saveContent()">Save changes</button>
            <div class="msg error" id="contentError"></div>
            <div class="msg ok" id="contentOk"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  let currentAdmin = null;
  let currentPage = 'index';
  let currentFields = [];

  const PAGES = [
    { key: 'index', label: 'Landing page' },
    { key: 'register', label: 'Register page' },
    { key: 'login', label: 'Login page' },
    { key: 'legal', label: 'Legal pages' },
    { key: 'contact', label: 'Contact info' },
  ];

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s ?? '';
    return d.innerHTML;
  }

  function sectionOf(key) {
    const map = [
      ['hero_', 'Hero'], ['how_', 'How it works'],
      ['roles_', 'Roles'], ['role1_', 'Roles'], ['role2_', 'Roles'], ['role3_', 'Roles'],
      ['workspace_', 'Workspace'], ['agents_', 'AI agents'], ['trust_', 'Trust'],
      ['pricing_', 'Pricing'], ['cta_', 'Closing CTA'], ['footer_', 'Footer'],
      ['brand_', 'Brand panel'], ['gate_', 'Plan gate'], ['join_', 'Join form'],
      ['card_', 'Sign-in card'],
      ['privacy_', 'Privacy Policy'], ['terms_', 'Terms of Use'], ['cookies_', 'Cookie Policy'],
      ['refunds_', 'Refund Policy'], ['security_', 'Security'],
      ['team_', 'Register form'], ['solo_', 'Register form'], ['tab_', 'Register form'],
      ['company_caption', 'Register form'], ['reg_', 'Register form'],
      ['faq_', 'FAQ'], ['contact_', 'Contact details'], ['social_', 'Social links'],
    ];
    for (const [prefix, label] of map) if (key.startsWith(prefix)) return label;
    return 'Other';
  }

  function toggleTheme() {
    const root = document.documentElement;
    const cur = root.getAttribute('data-theme') ||
      ((matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
    const next = cur === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('buinee-admin-theme', next);
  }

  async function logout() {
    await fetch('/api/admin/logout', { method: 'POST', credentials: 'same-origin' });
    location.href = '/admin/login';
  }

  function showMsg(id, text) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.classList.toggle('show', !!text);
  }

  function fieldControl(f, isOwner) {
    const id = 'f_' + f.key;
    if (!isOwner) {
      const display = f.type === 'bullets'
        ? f.value.split('\n').filter(Boolean).map(l => '• ' + l).join('\n')
        : f.value;
      return `<label>${esc(f.label)}<div class="readonly-value">${esc(display) || '<em>(empty)</em>'}</div></label>`;
    }
    if (f.type === 'bullets') {
      return `<label>${esc(f.label)}<textarea id="${id}" rows="4">${esc(f.value)}</textarea><span class="hint">One item per line.</span></label>`;
    }
    if (f.type === 'paragraph') {
      return `<label>${esc(f.label)}<textarea id="${id}" rows="3">${esc(f.value)}</textarea></label>`;
    }
    if (f.type === 'html') {
      return `<label>${esc(f.label)}<textarea id="${id}" rows="16" class="mono">${esc(f.value)}</textarea><span class="hint">Raw HTML, used as-is on the legal page.</span></label>`;
    }
    if (f.type === 'qa_list') {
      return `<label>${esc(f.label)}<textarea id="${id}" rows="14">${esc(f.value)}</textarea><span class="hint">One question per "Q:" line, followed by its answer on one or more "A:" lines. Add or remove pairs freely.</span></label>`;
    }
    return `<label>${esc(f.label)}<input type="text" id="${id}" value="${esc(f.value)}"></label>`;
  }

  function renderFields(fields, isOwner) {
    const groups = {};
    const order = [];
    for (const f of fields) {
      const s = sectionOf(f.key);
      if (!groups[s]) { groups[s] = []; order.push(s); }
      groups[s].push(f);
    }
    document.getElementById('fieldPanels').innerHTML = order.map(s => `
      <details class="panel" open>
        <summary>${esc(s)}</summary>
        <div class="fields">${groups[s].map(f => fieldControl(f, isOwner)).join('')}</div>
      </details>
    `).join('');
  }

  async function loadPage(pageKey) {
    currentPage = pageKey;
    document.querySelectorAll('.page-tab').forEach(b => b.classList.toggle('active', b.dataset.page === pageKey));
    showMsg('contentError', ''); showMsg('contentOk', '');
    document.getElementById('fieldPanels').innerHTML = '<div class="panel">Loading…</div>';
    let data;
    try {
      data = await (await fetch('/api/admin/site-content?page=' + encodeURIComponent(pageKey), { credentials: 'same-origin' })).json();
    } catch {
      document.getElementById('fieldPanels').innerHTML = '<div class="panel">Could not load this page\'s content.</div>';
      return;
    }
    currentFields = data.fields || [];
    const isOwner = currentAdmin.role === 'owner';
    renderFields(currentFields, isOwner);
    document.getElementById('saveBar').style.display = isOwner ? 'flex' : 'none';
    document.getElementById('readonlyBanner').style.display = isOwner ? 'none' : 'block';
  }

  async function saveContent() {
    showMsg('contentError', ''); showMsg('contentOk', '');
    const values = {};
    for (const f of currentFields) {
      const el = document.getElementById('f_' + f.key);
      if (el) values[f.key] = el.value;
    }
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const res = await fetch('/api/admin/site-content/save', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ page: currentPage, values }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg('contentError', data.error || 'Could not save.'); return; }
      currentFields = data.fields || currentFields;
      showMsg('contentOk', 'Saved — live on the public site now.');
    } catch {
      showMsg('contentError', 'Could not reach the server.');
    } finally {
      btn.disabled = false; btn.textContent = 'Save changes';
    }
  }

  async function main() {
    let admin;
    try {
      const res = await fetch('/api/admin/me', { credentials: 'same-origin' });
      if (!res.ok) { location.href = '/admin/login'; return; }
      admin = (await res.json()).admin;
    } catch { location.href = '/admin/login'; return; }

    currentAdmin = admin;
    document.getElementById('pageTabs').innerHTML = PAGES.map(p =>
      `<button class="page-tab" type="button" data-page="${p.key}" onclick="loadPage('${p.key}')">${esc(p.label)}</button>`
    ).join('');
    await loadPage('index');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  }

  main();
</script>
