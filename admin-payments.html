<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Payments · Command Center · Buinee</title>
  <style>
    :root { --paper:#f6f4ef; --surface:#fff; --surface-2:#efece5; --line:#dedad0; --ink:#101619; --ink-2:#3c4750; --muted:#6a747c; --green:#0e5d57; --green-soft:#dfece9; --good:#2c7a51; --good-soft:#dff0e6; --bad:#b0301f; --bad-soft:#fbe6e2; --sans:"Segoe UI",system-ui,sans-serif; --serif:Georgia,serif; --mono:Consolas,monospace; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--paper); color:var(--ink); font:14px/1.5 var(--sans); }
    .shell { display:flex; min-height:100vh; }
    .side { width:232px; position:sticky; top:0; height:100vh; overflow:auto; padding:20px 14px; background:var(--surface); border-right:1px solid var(--line); }
    .brand { display:flex; align-items:center; gap:10px; padding:0 10px 20px; color:var(--ink); text-decoration:none; } .brand-mark{width:30px;height:30px;display:grid;place-items:center;flex:none;border-radius:8px;background:linear-gradient(140deg,var(--green),#0a4340);color:#fff}.brand-mark svg{width:16px;height:16px}.brand-copy b,.brand-copy span{display:block}.brand-copy b{font:600 19px var(--serif)}
    .tag { display:block; color:var(--green); font:800 10px var(--sans); text-transform:uppercase; letter-spacing:.06em; }
    .nav { display:grid; gap:3px; }
    .nav a { padding:10px 12px; border-radius:9px; color:var(--ink-2); font-weight:650; text-decoration:none; }
    .nav a:hover,.nav a.on { background:var(--green-soft); color:var(--green); }
    main { flex:1; min-width:0; padding:38px; }
    .wrap { max-width:1200px; margin:auto; }
    .hero { margin-bottom:22px; }
    .eyebrow { color:var(--green); font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.1em; }
    .hero h1 { margin:5px 0 0; font:600 30px var(--serif); }
    .hero p { margin:5px 0; color:var(--muted); }
    .config,.card,.kpi { background:var(--surface); border:1px solid var(--line); border-radius:13px; }
    .config { padding:17px; margin-bottom:18px; }
    .config h2,.card h2 { margin:0; font:600 17px var(--serif); }
    .config h2 { margin-bottom:11px; }
    .config-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px; }
    .cfg { min-width:0; padding:12px; background:var(--surface-2); border-radius:9px; }
    .cfg b,.cfg span { display:block; overflow-wrap:anywhere; }
    .cfg span { color:var(--muted); font-size:12px; }
    .cfg b > span { display:inline; margin-left:5px; font-size:10px; font-weight:800; text-transform:uppercase; }
    .ok { color:var(--good)!important; }
    .bad { color:var(--bad)!important; }
    .kpis { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-bottom:18px; }
    .kpi { padding:16px; min-width:0; }
    .kpi b { display:block; overflow-wrap:anywhere; font:600 22px var(--serif); }
    .kpi span { color:var(--muted); font-size:11px; }
    .card { overflow:hidden; }
    .card h2 { padding:15px 17px; border-bottom:1px solid var(--line); }
    .payments { display:grid; }
    .payment { display:grid; grid-template-columns:minmax(0,1.3fr) minmax(150px,.7fr) minmax(160px,.8fr) auto; gap:16px; align-items:center; padding:14px 17px; border-bottom:1px solid var(--line); }
    .payment:last-child { border-bottom:0; }
    .payment b,.payment span { display:block; overflow-wrap:anywhere; }
    .payment span { color:var(--muted); font-size:11px; }
    .amount { font:700 16px var(--mono); }
    .status { justify-self:end; padding:4px 8px; border-radius:20px; background:var(--surface-2); font-size:10px!important; font-weight:800; text-transform:uppercase; }
    .status.success { background:var(--good-soft); color:var(--good); }
    .status.failed { background:var(--bad-soft); color:var(--bad); }
    .empty { padding:35px; text-align:center; color:var(--muted); }
    @media (max-width:760px) { .side{width:72px;padding:16px 8px}.brand{font-size:0;text-align:center}.brand:before{content:'B';font-size:20px}.tag,.nav a{font-size:0;text-align:center}.nav a:before{content:'•';font-size:18px}.config-grid,.kpis{grid-template-columns:1fr}.payment{grid-template-columns:1fr}.status{justify-self:start}main{padding:24px 14px} }

<body>
  <div class="shell">
    <aside class="side">
      <a class="brand" href="/admin"><span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h11"/></svg></span><span class="brand-copy"><b>Buinee</b><span class="tag">Command Center</span></span></a>
      <nav class="nav">
        <a href="/admin">Overview</a><a href="/admin/companies">Companies</a><a href="/admin/pipeline">Pipeline</a><a class="on" href="/admin/payments">Payments</a><a href="/admin/plans">Plans</a><a href="/admin/team">Back-office team</a><a href="/admin/reports">Reports</a><a href="/admin/inbox">Inbox</a><a href="/admin/invoices">Invoices</a><a href="/admin/errors">Error logs</a><a href="/admin/activity">Activity log</a><a href="/" target="_blank">View site</a><a href="/admin/settings">Settings</a>
      </nav>
    </aside>
    <main><div class="wrap">
      <header class="hero"><div class="eyebrow">Revenue ledger</div><h1>Payments</h1><p>Verified Paystack transactions and safe payment-method metadata.</p></header>
      <section class="config"><h2>Paystack configuration</h2><div class="config-grid" id="config"></div></section>
      <div class="kpis" id="kpis"></div>
      <section class="card"><h2>Recent payments</h2><div class="payments" id="payments"><div class="empty">Loading payments…</div></div></section>
    </div></main>
  </div>
  <script>
    const esc=s=>{const d=document.createElement('div');d.textContent=s??'';return d.innerHTML};
    const money=(n,c)=>`${c} ${(Number(n||0)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;
    const date=t=>t?new Date(typeof t==='number'?t*1000:t).toLocaleString():'—';
    async function main(){
      const me=await fetch('/api/admin/me',{credentials:'same-origin'});if(!me.ok){location.href='/admin/login';return}
      const res=await fetch('/api/admin/payments',{credentials:'same-origin'}),data=await res.json();
      if(!res.ok){document.getElementById('payments').innerHTML=`<div class="empty">${esc(data.error||'Payments could not be loaded.')}</div>`;return}
      const c=data.configuration,p=data.payments||[];
      document.getElementById('config').innerHTML=`<div class="cfg"><b>Public key <span class="${c.public_key_configured?'ok':'bad'}">${c.public_key_configured?'Configured':'Missing'}</span></b><span>${esc(c.public_key||'Set PAYSTACK_PUBLIC_KEY in cPanel')}</span></div><div class="cfg"><b>Secret key <span class="${c.secret_key_configured?'ok':'bad'}">${c.secret_key_configured?'Configured':'Missing'}</span></b><span>The secret is never returned to the browser.</span></div><div class="cfg"><b>Webhook URL</b><span>${esc(c.webhook_url)}</span></div><div class="cfg"><b>Callback URL</b><span>${esc(c.callback_url)}</span></div>`;
      const success=p.filter(x=>x.status==='success'),curr={};success.forEach(x=>curr[x.currency]=(curr[x.currency]||0)+x.amount_subunit);
      document.getElementById('kpis').innerHTML=`<div class="kpi"><b>${success.length}</b><span>Successful payments</span></div><div class="kpi"><b>${p.filter(x=>x.status==='initialized').length}</b><span>Awaiting confirmation</span></div><div class="kpi"><b>${Object.entries(curr).map(([c,n])=>money(n,c)).join(' · ')||'—'}</b><span>Verified volume by currency</span></div>`;
      document.getElementById('payments').innerHTML=p.length?p.map(x=>`<article class="payment"><div><b>${esc(x.company_name)}</b><span>${esc(x.customer_email)} · ${esc(x.plan_name)}</span><span>${esc(x.reference)}</span></div><div><b class="amount">${money(x.amount_subunit,x.currency)}</b><span>${date(x.paid_at||x.created_at)}</span></div><div><b>${x.card_last4?`${esc(x.card_brand||x.card_type)} •••• ${esc(x.card_last4)}`:esc(x.channel||'Checkout')}</b><span>${esc(x.card_bank||x.gateway_response||'No card metadata')}</span></div><span class="status ${esc(x.status)}">${esc(x.status)}</span></article>`).join(''):'<div class="empty">No payment attempts yet.</div>';
    }
    main();
  </script>
</body></html>
