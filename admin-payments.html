<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Payments — Command Center — Buinee</title>
<style>
:root{--paper:#f6f4ef;--surface:#fff;--surface2:#efece5;--line:#dedad0;--ink:#101619;--ink2:#3c4750;--muted:#6a747c;--violet:#6b5be6;--soft:#ecebfc;--good:#2c7a51;--goodsoft:#dff0e6;--bad:#b0301f;--badsoft:#fbe6e2;--sans:"Segoe UI",system-ui,sans-serif;--serif:Georgia,serif;--mono:Consolas,monospace}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:14px/1.5 var(--sans)}.shell{display:flex;min-height:100vh}.side{width:232px;position:sticky;top:0;height:100vh;overflow:auto;padding:20px 14px;background:var(--surface);border-right:1px solid var(--line)}.brand{display:block;padding:0 10px 20px;color:var(--ink);font:600 19px var(--serif);text-decoration:none}.tag{display:block;color:var(--violet);font:700 10px var(--sans);text-transform:uppercase}.nav{display:grid;gap:3px}.nav a{padding:10px 12px;border-radius:9px;color:var(--ink2);font-weight:600;text-decoration:none}.nav a:hover,.nav a.on{background:var(--soft);color:var(--violet)}main{flex:1;min-width:0;padding:38px}.wrap{max-width:1200px;margin:auto}.hero{display:flex;justify-content:space-between;gap:20px;margin-bottom:22px}.hero h1{margin:0;font:600 30px var(--serif)}.hero p{margin:5px 0;color:var(--muted)}.config,.card{background:var(--surface);border:1px solid var(--line);border-radius:13px}.config{padding:17px;margin-bottom:18px}.config h3{margin:0 0 10px}.config-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.cfg{padding:10px;background:var(--surface2);border-radius:9px}.cfg b,.cfg span{display:block}.cfg span{color:var(--muted;font-size:12px;overflow-wrap:anywhere}.ok{color:var(--good)}.bad{color:var(--bad)}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}.kpi{padding:15px;background:var(--surface);border:1px solid var(--line);border-radius:12px}.kpi b{display:block;font:600 22px var(--serif)}.kpi span{color:var(--muted);font-size:11px}.card h3{margin:0;padding:15px 17px;border-bottom:1px solid var(--line)}.payments{display:grid}.payment{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(150px,.7fr) minmax(160px,.8fr) auto;gap:16px;align-items:center;padding:14px 17px;border-bottom:1px solid var(--line)}.payment:last-child{border:0}.payment b,.payment span{display:block;overflow-wrap:anywhere}.payment span{color:var(--muted);font-size:11px}.amount{font:700 16px var(--mono)}.status{padding:4px 8px;border-radius:20px;background:var(--surface2);font-size:10px;font-weight:800;text-transform:uppercase}.status.success{background:var(--goodsoft);color:var(--good)}.status.failed{background:var(--badsoft);color:var(--bad)}.empty{padding:35px;text-align:center;color:var(--muted)}@media(max-width:760px){.side{width:72px}.brand{font-size:0}.brand:before{content:'B';font-size:20px}.tag,.nav a{font-size:0}.nav a:before{content:'•';font-size:18px}.config-grid,.kpis{grid-template-columns:1fr}.payment{grid-template-columns:1fr}.wrap{min-width:0}main{padding:24px 14px}}
</style><div class="shell"><aside class="side"><a class="brand" href="/admin.html">Buinee<span class="tag">Command Center</span></a><nav class="nav"><a href="/admin.html">Overview</a><a href="/admin-companies.html">Companies</a><a href="/admin-pipeline.html">Pipeline</a><a class="on" href="/admin-payments.html">Payments</a><a href="/admin-plans.html">Plans</a><a href="/admin-settings.html">Settings</a></nav></aside><main><div class="wrap"><div class="hero"><div><h1>Payments</h1><p>Verified Paystack transactions and safe payment-method metadata.</p></div></div><section class="config"><h3>Paystack configuration</h3><div class="config-grid" id="config"></div></section><div class="kpis" id="kpis"></div><section class="card"><h3>Recent payments</h3><div class="payments" id="payments"><div class="empty">Loading payments…</div></div></section></div></main></div>
<style>.cfg span{color:var(--muted);font-size:12px;overflow-wrap:anywhere}</style>
<script>
const esc=s=>{const d=document.createElement('div');d.textContent=s??'';return d.innerHTML};const money=(n,c)=>`${c} ${(Number(n||0)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;const date=t=>t?new Date(typeof t==='number'?t*1000:t).toLocaleString():'—';
async function main(){const me=await fetch('/api/admin/me',{credentials:'same-origin'});if(!me.ok){location.href='/admin-login.html';return}const res=await fetch('/api/admin/payments',{credentials:'same-origin'}),data=await res.json();if(!res.ok)return;const c=data.configuration,p=data.payments||[];document.getElementById('config').innerHTML=`<div class="cfg"><b>Public key <span class="${c.public_key_configured?'ok':'bad'}">${c.public_key_configured?'Configured':'Missing'}</span></b><span>${esc(c.public_key||'Set PAYSTACK_PUBLIC_KEY in cPanel')}</span></div><div class="cfg"><b>Secret key <span class="${c.secret_key_configured?'ok':'bad'}">${c.secret_key_configured?'Configured':'Missing'}</span></b><span>The secret is never returned to the browser.</span></div><div class="cfg"><b>Webhook URL</b><span>${esc(c.webhook_url)}</span></div><div class="cfg"><b>Callback URL</b><span>${esc(c.callback_url)}</span></div>`;const success=p.filter(x=>x.status==='success'),curr={};success.forEach(x=>curr[x.currency]=(curr[x.currency]||0)+x.amount_subunit);document.getElementById('kpis').innerHTML=`<div class="kpi"><b>${success.length}</b><span>Successful payments</span></div><div class="kpi"><b>${p.filter(x=>x.status==='initialized').length}</b><span>Awaiting confirmation</span></div><div class="kpi"><b>${Object.entries(curr).map(([c,n])=>money(n,c)).join(' · ')||'—'}</b><span>Verified volume by currency</span></div>`;document.getElementById('payments').innerHTML=p.length?p.map(x=>`<article class="payment"><div><b>${esc(x.company_name)}</b><span>${esc(x.customer_email)} · ${esc(x.plan_name)}</span><span>${esc(x.reference)}</span></div><div><b class="amount">${money(x.amount_subunit,x.currency)}</b><span>${date(x.paid_at||x.created_at)}</span></div><div><b>${x.card_last4?`${esc(x.card_brand||x.card_type)} •••• ${esc(x.card_last4)}`:esc(x.channel||'Checkout')}</b><span>${esc(x.card_bank||x.gateway_response||'No card metadata')}</span></div><span class="status ${esc(x.status)}">${esc(x.status)}</span></article>`).join(''):'<div class="empty">No payment attempts yet.</div>'}main();
</script>
