<meta charset="utf-8">
<title>Site Settings — Command Center — Buinee</title>
<meta name="description" content="Control when the public Ask Ada live chat widget shows as online.">
<style>
  :root {
    --paper: #f6f4ef; --surface: #ffffff; --surface-2: #efece5;
    --line: #dedad0; --line-strong: #c9c4b7;
    --ink: #101619; --ink-2: #3c4750; --ink-3: #6a747c; --ink-4: #949ba1;
    --teal: #0e5d57; --teal-deep: #0a4340; --teal-soft: #dfece9;
    --ochre: #c0611c; --ochre-soft: #f8ead9;
    --good: #2c7a51; --good-soft: #dff0e6; --warn: #b07d1b; --warn-soft: #f8eed6;
    --bad: #b0301f; --bad-soft: #fbe6e2;
    --violet: #0e5d57; --violet-soft: #dfece9;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(16,22,25,.05), 0 14px 34px rgba(16,22,25,.07);
    --sans: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --mono: "SFMono-Regular", ui-monospace, "Cascadia Code", Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #0e1315; --surface: #151b1e; --surface-2: #1c2427; --line: #262f33;
      --line-strong: #354046; --ink: #eef1f0; --ink-2: #bcc5c7; --ink-3: #8b9599; --ink-4: #6b7478;
      --teal: #4fb3a6; --teal-deep: #6fcbbd; --teal-soft: #10312e;
      --ochre: #e0913f; --ochre-soft: #2e2113;
      --good: #4bb37c; --good-soft: #12291d; --warn: #d09b3c; --warn-soft: #2a2113;
      --bad: #e07a68; --bad-soft: #341714;
      --violet: #4fb3a6; --violet-soft: #10312e;
      --shadow: 0 1px 2px rgba(0,0,0,.5), 0 14px 34px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="dark"] {
    --paper: #0e1315; --surface: #151b1e; --surface-2: #1c2427; --line: #262f33;
    --line-strong: #354046; --ink: #eef1f0; --ink-2: #bcc5c7; --ink-3: #8b9599; --ink-4: #6b7478;
    --teal: #4fb3a6; --teal-deep: #6fcbbd; --teal-soft: #10312e;
    --ochre: #e0913f; --ochre-soft: #2e2113;
    --good: #4bb37c; --good-soft: #12291d; --warn: #d09b3c; --warn-soft: #2a2113;
    --bad: #e07a68; --bad-soft: #341714;
    --violet: #4fb3a6; --violet-soft: #10312e;
    --shadow: 0 1px 2px rgba(0,0,0,.5), 0 14px 34px rgba(0,0,0,.4);
  }
  :root[data-theme="light"] {
    --paper: #f6f4ef; --surface: #ffffff; --surface-2: #efece5; --line: #dedad0;
    --line-strong: #c9c4b7; --ink: #101619; --ink-2: #3c4750; --ink-3: #6a747c; --ink-4: #949ba1;
    --teal: #0e5d57; --teal-deep: #0a4340; --teal-soft: #dfece9;
    --ochre: #c0611c; --ochre-soft: #f8ead9;
    --good: #2c7a51; --good-soft: #dff0e6; --warn: #b07d1b; --warn-soft: #f8eed6;
    --bad: #b0301f; --bad-soft: #fbe6e2;
    --violet: #0e5d57; --violet-soft: #dfece9;
    --shadow: 0 1px 2px rgba(16,22,25,.05), 0 14px 34px rgba(16,22,25,.07);
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  h1,h2,h3 { margin: 0; font-weight: 600; letter-spacing: -.02em; }
  p { margin: 0; }
  button, input { font-family: inherit; font-size: inherit; }
  :focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; border-radius: 4px; }

  .shell { display: flex; height: 100vh; height: 100dvh; }
  .sidebar {
    width: 232px; flex: none; background: var(--surface); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; padding: 20px 14px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; padding: 0 8px; }
  .sidebar-brand .mark { width: 30px; height: 30px; border-radius: 8px; flex: none; display: grid; place-items: center; background: linear-gradient(140deg, var(--violet), #0a4340); color: #fff; }
  .sidebar-brand .mark svg { width: 16px; height: 16px; }
  .sidebar-brand .name { font-family: var(--serif); font-size: 18px; font-weight: 600; }
  .sidebar-tag { font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--violet); padding: 3px 8px; margin: 6px 0 18px; }
  .sidebar-nav { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .sidebar-link {
    display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 9px;
    font-size: 14px; font-weight: 600; color: var(--ink-2); text-decoration: none; cursor: pointer;
    border: none; background: none; width: 100%; text-align: left;
  }
  .sidebar-link svg { width: 17px; height: 17px; flex: none; }
  .sidebar-link:hover { background: var(--surface-2); color: var(--ink); }
  .sidebar-link.active { background: var(--violet-soft); color: var(--violet); }
  .sidebar-foot { border-top: 1px solid var(--line); margin-top: 10px; padding-top: 10px; display: flex; flex-direction: column; gap: 3px; }

  .content { flex: 1; min-width: 0; }
  main { padding: 40px 0 70px; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 28px; }
  .hero-line { margin-bottom: 24px; }
  .hero-line .eyebrow { font-size: 11.5px; letter-spacing: .13em; text-transform: uppercase; font-weight: 700; color: var(--violet); }
  .hero-line h1 { font-family: var(--serif); font-size: 26px; margin: 8px 0 6px; }
  .hero-line p { font-size: 14.5px; color: var(--ink-2); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 8px 15px; border-radius: 9px; font-size: 13.5px; font-weight: 600;
    text-decoration: none; border: 1px solid var(--line-strong); cursor: pointer;
    background: var(--surface); color: var(--ink); white-space: nowrap;
  }
  .btn:hover { border-color: var(--violet); color: var(--violet); }
  .btn.primary { background: var(--violet); color: #fff; border-color: transparent; }
  .btn.primary:hover { background: var(--teal-deep); }
  .btn.primary:disabled { opacity: .6; cursor: default; }

  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; }
  .panel + .panel { margin-top: 18px; }
  .panel h3 { font-size: 15.5px; margin-bottom: 4px; }
  .panel .sub { font-size: 12.5px; color: var(--ink-3); margin-bottom: 18px; }

  form { display: flex; flex-direction: column; gap: 15px; }
  label { font-size: 13px; font-weight: 600; color: var(--ink-2); display: flex; flex-direction: column; gap: 6px; }
  input[type=time] { padding: 7px 9px; border-radius: 8px; border: 1px solid var(--line-strong); background: var(--paper); color: var(--ink); font-weight: 400; width: 110px; }
  input:focus { border-color: var(--violet); }

  .msg { font-size: 13.5px; padding: 10px 13px; border-radius: 9px; display: none; }
  .msg.show { display: block; }
  .msg.error { background: var(--bad-soft); color: var(--bad); }
  .msg.ok { background: var(--good-soft); color: var(--good); }

  .status-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 10px; background: var(--surface-2); margin-bottom: 18px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .status-dot.online { background: var(--good); box-shadow: 0 0 0 3px var(--good-soft); }
  .status-dot.offline { background: var(--ink-4); box-shadow: 0 0 0 3px var(--surface); }
  .status-row b { font-size: 13.5px; }
  .status-row span { display: block; font-size: 11.5px; color: var(--ink-3); }

  .mode-options { display: flex; flex-direction: column; gap: 8px; }
  .mode-option { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px; cursor: pointer; }
  .mode-option:has(input:checked) { border-color: var(--violet); background: var(--violet-soft); }
  .mode-option input { margin-top: 3px; }
  .mode-option div { display: flex; flex-direction: column; gap: 2px; }
  .mode-option b { font-size: 13.5px; color: var(--ink); }
  .mode-option span { font-size: 12px; color: var(--ink-3); font-weight: 400; }

  .schedule-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .schedule-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-3); padding: 6px 8px; }
  .schedule-table td { padding: 7px 8px; border-top: 1px solid var(--line); }
  .schedule-table .day-name { font-weight: 600; }
  .schedule-table.disabled { opacity: .5; pointer-events: none; }

  #loading { padding: 80px 0; text-align: center; color: var(--ink-3); font-size: 14px; }

  @media (max-width: 640px) {
    .sidebar { width: 64px; padding: 16px 8px; }
    .sidebar-brand { justify-content: center; padding: 0; }
    .sidebar-brand .name, .sidebar-tag, .sidebar-link .label { display: none; }
    .sidebar-link { justify-content: center; padding: 10px; }
    .schedule-table { display: block; overflow-x: auto; }
  }
</style>

<div class="shell">
  <aside class="sidebar">
    <a class="sidebar-brand" href="/admin">
      <span class="mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h11"/></svg></span>
      <span class="name">Buinee</span>
    </a>
    <div class="sidebar-tag">Command Center</div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-foot">
      <button class="sidebar-link" onclick="toggleTheme()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <span class="label">Toggle theme</span>
      </button>
      <button class="sidebar-link" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        <span class="label">Sign out</span>
      </button>
    </div>
  </aside>

  <div class="content">
    <main>
      <div class="wrap">
        <div id="loading">Loading…</div>
        <div id="content" style="display:none">
          <div class="hero-line">
            <span class="eyebrow">Site settings</span>
            <h1>Live chat</h1>
            <p>Control when the "Ask Ada" widget on the public site shows as online.</p>
          </div>

          <div class="panel">
            <div class="status-row">
              <span class="status-dot" id="statusDot"></span>
              <div>
                <b id="statusText">Checking…</b>
                <span id="statusSub"></span>
              </div>
            </div>

            <div id="livechatReadonly" style="display:none"></div>

            <form id="livechatForm" onsubmit="return saveLivechat(event)" style="display:none">
              <div class="msg error" id="livechatError"></div>
              <div class="msg ok" id="livechatOk"></div>

              <label>Mode
                <div class="mode-options">
                  <label class="mode-option">
                    <input type="radio" name="mode" value="schedule" checked onchange="onModeChange()">
                    <div><b>Follow schedule</b><span>Online only during the hours set below</span></div>
                  </label>
                  <label class="mode-option">
                    <input type="radio" name="mode" value="always_on" onchange="onModeChange()">
                    <div><b>Always online</b><span>Ignore the schedule, always show as available</span></div>
                  </label>
                  <label class="mode-option">
                    <input type="radio" name="mode" value="always_off" onchange="onModeChange()">
                    <div><b>Always offline</b><span>Ignore the schedule, always show as unavailable</span></div>
                  </label>
                </div>
              </label>

              <label>Weekly schedule
                <table class="schedule-table" id="scheduleTable">
                  <thead><tr><th></th><th>Active</th><th>From</th><th>To</th></tr></thead>
                  <tbody id="scheduleBody"></tbody>
                </table>
              </label>

              <button class="btn primary" type="submit" id="saveBtn">Save live chat settings</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  let currentAdmin = null;
  const DAY_LABELS = { mon: "Monday", tue: "Tuesday", wed: "Wednesday", thu: "Thursday", fri: "Friday", sat: "Saturday", sun: "Sunday" };

  function toggleTheme() {
    const root = document.documentElement;
    const cur = root.getAttribute('data-theme') ||
      ((matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
    const next = cur === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('buinee-admin-theme', next);
  }

  async function logout() {
    await fetch('/api/admin/logout', { method: 'POST', credentials: 'same-origin' });
    location.href = '/admin/login';
  }

  function showMsg(id, text) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.classList.toggle('show', !!text);
  }

  function renderScheduleRows(schedule) {
    const body = document.getElementById('scheduleBody');
    body.innerHTML = Object.keys(DAY_LABELS).map(day => {
      const entry = schedule[day] || { enabled: false, start: '08:00', end: '18:00' };
      return `<tr>
        <td class="day-name">${DAY_LABELS[day]}</td>
        <td><input type="checkbox" id="day-${day}-enabled" ${entry.enabled ? 'checked' : ''}></td>
        <td><input type="time" id="day-${day}-start" value="${entry.start}"></td>
        <td><input type="time" id="day-${day}-end" value="${entry.end}"></td>
      </tr>`;
    }).join('');
  }

  function onModeChange() {
    const mode = document.querySelector('input[name="mode"]:checked').value;
    document.getElementById('scheduleTable').classList.toggle('disabled', mode !== 'schedule');
  }

  function renderStatus(online) {
    document.getElementById('statusDot').className = 'status-dot ' + (online ? 'online' : 'offline');
    document.getElementById('statusText').textContent = online ? 'Online right now' : 'Offline right now';
    document.getElementById('statusSub').textContent = online
      ? 'Visitors see the live chat widget as available.'
      : 'Visitors see the live chat widget as unavailable.';
  }

  async function loadSiteSettings() {
    let data;
    try {
      data = await (await fetch('/api/admin/site-settings', { credentials: 'same-origin' })).json();
    } catch {
      document.getElementById('statusText').textContent = 'Could not load settings.';
      return;
    }
    renderStatus(data.livechat_online);

    const isOwner = currentAdmin.role === 'owner';
    const readonly = document.getElementById('livechatReadonly');
    const form = document.getElementById('livechatForm');
    if (isOwner) {
      readonly.style.display = 'none';
      form.style.display = 'flex';
      document.querySelector(`input[name="mode"][value="${data.livechat_mode}"]`).checked = true;
      renderScheduleRows(data.livechat_schedule || {});
      onModeChange();
    } else {
      form.style.display = 'none';
      readonly.style.display = 'block';
      const modeLabels = { schedule: 'Follows the weekly schedule', always_on: 'Always online', always_off: 'Always offline' };
      readonly.textContent = (modeLabels[data.livechat_mode] || data.livechat_mode) + '. Only the owner can change this.';
    }
  }

  async function saveLivechat(ev) {
    ev.preventDefault();
    showMsg('livechatError', ''); showMsg('livechatOk', '');
    const mode = document.querySelector('input[name="mode"]:checked').value;
    const schedule = {};
    for (const day of Object.keys(DAY_LABELS)) {
      schedule[day] = {
        enabled: document.getElementById(`day-${day}-enabled`).checked,
        start: document.getElementById(`day-${day}-start`).value || '08:00',
        end: document.getElementById(`day-${day}-end`).value || '18:00',
      };
    }
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const res = await fetch('/api/admin/site-settings/livechat', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode, schedule }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg('livechatError', data.error || 'Could not save.'); return false; }
      showMsg('livechatOk', 'Saved.');
      renderStatus(data.livechat_online);
    } catch {
      showMsg('livechatError', 'Could not reach the server.');
    } finally {
      btn.disabled = false; btn.textContent = 'Save live chat settings';
    }
    return false;
  }

  async function main() {
    let admin;
    try {
      const res = await fetch('/api/admin/me', { credentials: 'same-origin' });
      if (!res.ok) { location.href = '/admin/login'; return; }
      admin = (await res.json()).admin;
    } catch { location.href = '/admin/login'; return; }

    currentAdmin = admin;
    await loadSiteSettings();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  }

  main();
</script>
