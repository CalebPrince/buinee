<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Activity log · Buinee</title><style>
:root{--paper:#f6f4ef;--surface:#fff;--surface2:#efece5;--line:#dedad0;--ink:#101619;--ink2:#3c4750;--muted:#6a747c;--teal:#0e5d57;--deep:#0a4340;--soft:#dfece9;--bad:#b0301f;--sans:"Segoe UI",system-ui,sans-serif;--serif:Georgia,serif;--mono:Consolas,monospace}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:14px/1.5 var(--sans)}button,select{font:inherit}.shell{display:flex;min-height:100vh}.side{width:232px;position:sticky;top:0;height:100vh;overflow:auto;padding:20px 14px;background:var(--surface);border-right:1px solid var(--line)}.brand{display:flex;align-items:center;gap:10px;padding:0 8px 20px;color:var(--ink);text-decoration:none}.mark{width:30px;height:30px;display:grid;place-items:center;border-radius:8px;background:linear-gradient(140deg,var(--teal),var(--deep));color:#fff}.mark svg{width:16px}.brand b{font:600 19px var(--serif)}.brand small{display:block;color:var(--teal);font-size:10px;font-weight:800;text-transform:uppercase}.nav{display:grid;gap:3px}.nav a{padding:10px 12px;border-radius:9px;color:var(--ink2);font-weight:650;text-decoration:none}.nav a:hover,.nav a.on{background:var(--soft);color:var(--teal)}main{flex:1;min-width:0;padding:38px}.wrap{max-width:1200px;margin:auto}.eyebrow{color:var(--teal);font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}h1{margin:5px 0;font:600 30px var(--serif)}.hero p{margin:0;color:var(--muted)}.filters{display:flex;gap:9px;margin:22px 0 14px}.filters select,.btn{padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--ink)}.card{overflow:hidden;border:1px solid var(--line);border-radius:14px;background:var(--surface)}.row{display:grid;grid-template-columns:165px minmax(150px,.8fr) 125px 145px minmax(220px,1.4fr);gap:14px;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line)}.row:last-child{border:0}.head{background:var(--surface2);color:var(--muted);font-size:10px;font-weight:800;text-transform:uppercase}.who b,.who small,.detail b,.detail span{display:block}.who small,.detail span,.when{color:var(--muted);font-size:11px}.action{justify-self:start;padding:4px 8px;border-radius:20px;background:var(--soft);color:var(--teal);font-size:10px;font-weight:800;text-transform:uppercase}.entity{font:12px var(--mono)}.empty{padding:45px;text-align:center;color:var(--muted)}.pager{display:flex;justify-content:space-between;align-items:center;margin-top:13px;color:var(--muted);font-size:12px}.pager div{display:flex;gap:7px}.btn{cursor:pointer;font-weight:700}.btn:disabled{opacity:.4;cursor:default}@media(max-width:850px){.side{width:74px}.brand b,.brand small,.nav a{font-size:0}.nav a:before{content:'•';font-size:18px}.row{grid-template-columns:1fr 1fr}.head{display:none}.detail{grid-column:1/-1}main{padding:24px 14px}.filters{flex-wrap:wrap}}
</style></head><body><div class="shell"><aside class="side"><a class="brand" href="/admin.html"><span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h11"/></svg></span><span><b>Buinee</b><small>Command Center</small></span></a><nav class="nav"><a href="/admin.html">Overview</a><a href="/admin-companies.html">Companies</a><a href="/admin-pipeline.html">Pipeline</a><a href="/admin-payments.html">Payments</a><a href="/admin-plans.html">Plans</a><a href="/admin-team.html">Back-office team</a><a class="on" href="/admin-activity.html">Activity log</a><a href="/admin-settings.html">Settings</a><a href="/" target="_blank">View site</a></nav></aside><main><div class="wrap"><header class="hero"><div class="eyebrow">Accountability trail</div><h1>Activity log</h1><p>See who changed what across the Buinee Command Center.</p></header><div class="filters"><select id="entity"><option value="">All record types</option></select><select id="action"><option value="">All actions</option></select></div><section class="card"><div class="row head"><span>When</span><span>Administrator</span><span>Action</span><span>Record</span><span>Details</span></div><div id="rows"><div class="empty">Loading activity…</div></div></section><footer class="pager"><span id="pageInfo"></span><div><button class="btn" id="prev">Newer</button><button class="btn" id="next">Older</button></div></footer></div></main></div>
<script>
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),label=s=>String(s||'').replaceAll('_',' ').replace(/\b\w/g,c=>c.toUpperCase());let page=1,totalPages=1,loadedFilters=false;
async function load(){const q=new URLSearchParams({page});const entity=document.getElementById('entity').value,action=document.getElementById('action').value;if(entity)q.set('entity_type',entity);if(action)q.set('action',action);const r=await fetch('/api/admin/activity?'+q,{credentials:'same-origin'});if(r.status===401){location.href='/admin-login.html';return}const d=await r.json();if(!r.ok){document.getElementById('rows').innerHTML=`<div class="empty">${esc(d.error||'Activity could not be loaded.')}</div>`;return}if(!loadedFilters){for(const [id,items] of [['entity',d.entity_types],['action',d.actions]])for(const item of items){const o=document.createElement('option');o.value=item;o.textContent=label(item);document.getElementById(id).appendChild(o)}loadedFilters=true}document.getElementById('rows').innerHTML=d.rows.length?d.rows.map(x=>`<article class="row"><time class="when">${new Date(x.created_at*1000).toLocaleString()}</time><div class="who"><b>${esc(x.admin_name||'System')}</b><small>${esc(x.admin_email)}</small></div><span class="action">${label(x.action)}</span><span class="entity">${label(x.entity_type)}${x.entity_id?' #'+esc(x.entity_id):''}</span><div class="detail"><b>${esc(x.entity_label||'—')}</b><span>${esc(x.details)}</span></div></article>`).join(''):'<div class="empty">No activity has been recorded yet. New Command Center changes will appear here.</div>';totalPages=Math.max(1,Math.ceil(d.total/d.per_page));document.getElementById('pageInfo').textContent=`Page ${page} of ${totalPages} · ${d.total} entries`;document.getElementById('prev').disabled=page<=1;document.getElementById('next').disabled=page>=totalPages}
for(const id of ['entity','action'])document.getElementById(id).addEventListener('change',()=>{page=1;load()});document.getElementById('prev').onclick=()=>{if(page>1){page--;load()}};document.getElementById('next').onclick=()=>{if(page<totalPages){page++;load()}};load();
</script></body></html>
