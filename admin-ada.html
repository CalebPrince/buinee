<meta charset="utf-8">
<title>Ask Ada — Command Center — Buinee</title>
<meta name="description" content="Chat with Ada about companies, payments, pipeline, and everything else your Command Center role can see.">
<style>
  :root {
    --paper: #f6f4ef; --surface: #ffffff; --surface-2: #efece5;
    --line: #dedad0; --line-strong: #c9c4b7;
    --ink: #101619; --ink-2: #3c4750; --ink-3: #6a747c; --ink-4: #949ba1;
    --teal: #0e5d57; --teal-deep: #0a4340; --teal-soft: #dfece9;
    --ochre: #c0611c; --ochre-soft: #f8ead9;
    --good: #2c7a51; --good-soft: #dff0e6; --warn: #b07d1b; --warn-soft: #f8eed6;
    --bad: #b0301f; --bad-soft: #fbe6e2;
    --violet: #0e5d57; --violet-soft: #dfece9;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(16,22,25,.05), 0 14px 34px rgba(16,22,25,.07);
    --sans: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --mono: "SFMono-Regular", ui-monospace, "Cascadia Code", Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #0e1315; --surface: #151b1e; --surface-2: #1c2427; --line: #262f33;
      --line-strong: #354046; --ink: #eef1f0; --ink-2: #bcc5c7; --ink-3: #8b9599; --ink-4: #6b7478;
      --teal: #4fb3a6; --teal-deep: #6fcbbd; --teal-soft: #10312e;
      --ochre: #e0913f; --ochre-soft: #2e2113;
      --good: #4bb37c; --good-soft: #12291d; --warn: #d09b3c; --warn-soft: #2a2113;
      --bad: #e07a68; --bad-soft: #341714;
      --violet: #4fb3a6; --violet-soft: #10312e;
      --shadow: 0 1px 2px rgba(0,0,0,.5), 0 14px 34px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="dark"] {
    --paper: #0e1315; --surface: #151b1e; --surface-2: #1c2427; --line: #262f33;
    --line-strong: #354046; --ink: #eef1f0; --ink-2: #bcc5c7; --ink-3: #8b9599; --ink-4: #6b7478;
    --teal: #4fb3a6; --teal-deep: #6fcbbd; --teal-soft: #10312e;
    --ochre: #e0913f; --ochre-soft: #2e2113;
    --good: #4bb37c; --good-soft: #12291d; --warn: #d09b3c; --warn-soft: #2a2113;
    --bad: #e07a68; --bad-soft: #341714;
    --violet: #4fb3a6; --violet-soft: #10312e;
    --shadow: 0 1px 2px rgba(0,0,0,.5), 0 14px 34px rgba(0,0,0,.4);
  }
  :root[data-theme="light"] {
    --paper: #f6f4ef; --surface: #ffffff; --surface-2: #efece5; --line: #dedad0;
    --line-strong: #c9c4b7; --ink: #101619; --ink-2: #3c4750; --ink-3: #6a747c; --ink-4: #949ba1;
    --teal: #0e5d57; --teal-deep: #0a4340; --teal-soft: #dfece9;
    --ochre: #c0611c; --ochre-soft: #f8ead9;
    --good: #2c7a51; --good-soft: #dff0e6; --warn: #b07d1b; --warn-soft: #f8eed6;
    --bad: #b0301f; --bad-soft: #fbe6e2;
    --violet: #0e5d57; --violet-soft: #dfece9;
    --shadow: 0 1px 2px rgba(16,22,25,.05), 0 14px 34px rgba(16,22,25,.07);
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  h1,h2,h3 { margin: 0; font-weight: 600; letter-spacing: -.02em; }
  p { margin: 0; }
  button { font-family: inherit; font-size: inherit; }
  :focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; border-radius: 4px; }

  .shell { display: flex; height: 100vh; height: 100dvh; }
  .sidebar {
    width: 232px; flex: none; background: var(--surface); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; padding: 20px 14px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; padding: 0 8px; }
  .sidebar-brand .mark { width: 30px; height: 30px; border-radius: 8px; flex: none; display: grid; place-items: center; background: linear-gradient(140deg, var(--violet), #0a4340); color: #fff; }
  .sidebar-brand .mark svg { width: 16px; height: 16px; }
  .sidebar-brand .name { font-family: var(--serif); font-size: 18px; font-weight: 600; }
  .sidebar-tag { font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--violet); padding: 3px 8px; margin: 6px 0 18px; }
  .sidebar-nav { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .sidebar-link {
    display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 9px;
    font-size: 14px; font-weight: 600; color: var(--ink-2); text-decoration: none; cursor: pointer;
    border: none; background: none; width: 100%; text-align: left;
  }
  .sidebar-link svg { width: 17px; height: 17px; flex: none; }
  .sidebar-link:hover { background: var(--surface-2); color: var(--ink); }
  .sidebar-link.active { background: var(--violet-soft); color: var(--violet); }
  .sidebar-foot { border-top: 1px solid var(--line); margin-top: 10px; padding-top: 10px; display: flex; flex-direction: column; gap: 3px; }

  .content { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  main { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 8px 15px; border-radius: 9px; font-size: 13.5px; font-weight: 600;
    text-decoration: none; border: 1px solid var(--line-strong); cursor: pointer;
    background: var(--surface); color: var(--ink); white-space: nowrap;
  }
  .btn:hover { border-color: var(--violet); color: var(--violet); }
  .btn.sm { padding: 6px 11px; font-size: 12.5px; }

  .icobtn { width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--line); background: var(--surface); display: grid; place-items: center; color: var(--ink-2); transition: .12s; }
  .icobtn:hover { background: var(--surface-2); color: var(--ink); }
  .icobtn svg { width: 17px; height: 17px; }

  /* Ask Ada - mirrors dashboard.html's Ada chat view, adapted for the Command Center shell. */
  .ada-chat-view { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .ada-chatwrap { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .ada-chat-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 26px 28px; }
  .ada-chat-inner { width: 100%; max-width: 780px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  .ada-chat-log { display: flex; flex-direction: column; gap: 16px; }
  .ada-msg { display: flex; gap: 11px; }
  .ada-msg .bub { max-width: 78%; padding: 11px 14px; border-radius: 13px; font-size: 13.5px; line-height: 1.6; overflow-wrap: anywhere; }
  .ada-msg .av { width: 28px; height: 28px; border-radius: 9px; flex: none; display: grid; place-items: center; font-size: 11px; font-weight: 800; color: #fff; }
  .ada-msg.ai .av { background: linear-gradient(135deg, var(--ochre), #8e4214); }
  .ada-msg.ai .bub { background: var(--surface); border: 1px solid var(--line); border-top-left-radius: 4px; }
  .ada-msg.me { flex-direction: row-reverse; }
  .ada-msg.me .av { border-radius: 50%; background: linear-gradient(135deg, var(--teal), var(--teal-deep)); }
  .ada-msg.me .bub { background: var(--teal); color: #fff; border-top-right-radius: 4px; }
  .ada-msg .meta { display: block; margin-top: 8px; color: var(--ink-4); font: 10.5px var(--mono); }
  .ada-starters { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; width: 100%; }
  .ada-starters[hidden] { display: none; }
  .ada-starter { padding: 12px 14px; border: 1px solid var(--line); border-radius: 11px; background: var(--surface); color: var(--ink-2); text-align: left; font-size: 12.5px; transition: .12s; }
  .ada-starter b { display: block; margin-bottom: 2px; color: var(--ink); font-size: 13px; }
  .ada-starter:hover { border-color: var(--ochre); background: var(--ochre-soft); color: var(--ochre); }
  .ada-composer { flex: none; padding: 14px 28px 18px; border-top: 1px solid var(--line); background: var(--surface); }
  .ada-composer-inner { max-width: 780px; margin: 0 auto; }
  .ada-attach-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .ada-attach-chip { display: inline-flex; align-items: center; gap: 7px; padding: 5px 9px; border-radius: 8px; background: var(--surface-2); color: var(--ink-2); font-size: 11.5px; }
  .ada-attach-chip button { border: 0; background: transparent; color: var(--ink-3); padding: 0; }
  .ada-box { display: flex; align-items: flex-end; gap: 9px; padding: 8px 8px 8px 13px; border: 1px solid var(--line-strong); border-radius: 13px; background: var(--paper); transition: border-color .12s, box-shadow .12s; }
  .ada-box:focus-within { border-color: var(--ochre); box-shadow: 0 0 0 3px var(--ochre-soft); }
  .ada-box textarea { flex: 1; max-height: 140px; padding: 4px 0; border: 0; outline: 0; resize: none; background: transparent; color: var(--ink); font: 13.5px/1.55 var(--sans); }
  .ada-send { width: 34px; height: 34px; border: 0; border-radius: 9px; display: grid; place-items: center; flex: none; background: var(--ochre); color: #fff; }
  .ada-send:hover { background: #8e4214; }
  .ada-send svg { width: 16px; height: 16px; }
  .ada-composer-foot { display: flex; justify-content: space-between; gap: 12px; margin-top: 9px; flex-wrap: wrap; color: var(--ink-4); font-size: 11px; }
  .typing { display: flex; align-items: center; gap: 5px; padding: 4px 2px; }
  .typing i { width: 7px; height: 7px; border-radius: 50%; display: block; background: var(--ochre); animation: blink 1.3s ease-in-out infinite; }
  .typing i:nth-child(2) { animation-delay: .18s; }
  .typing i:nth-child(3) { animation-delay: .36s; }
  @keyframes blink { 0%, 60%, 100% { opacity: .25; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }
  @media (prefers-reduced-motion: reduce) { .typing i { animation: none; opacity: .55; } }

  #loading { padding: 80px 0; text-align: center; color: var(--ink-3); font-size: 14px; }

  @media (max-width: 640px) {
    .sidebar { width: 64px; padding: 16px 8px; }
    .sidebar-brand { justify-content: center; padding: 0; }
    .sidebar-brand .name, .sidebar-tag, .sidebar-link .label { display: none; }
    .sidebar-link { justify-content: center; padding: 10px; }
    .ada-starters { grid-template-columns: 1fr; }
  }
</style>

<div class="shell">
  <aside class="sidebar">
    <a class="sidebar-brand" href="/admin">
      <span class="mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h11"/></svg></span>
      <span class="name">Buinee</span>
    </a>
    <div class="sidebar-tag">Command Center</div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-foot">
      <button class="sidebar-link" onclick="toggleTheme()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <span class="label">Toggle theme</span>
      </button>
      <button class="sidebar-link" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        <span class="label">Sign out</span>
      </button>
    </div>
  </aside>

  <div class="content">
    <main>
      <div id="loading">Loading Ada…</div>

      <section class="ada-chat-view" id="viewChat" hidden>
        <div class="ada-chatwrap">
          <div class="ada-chat-scroll" id="chatScroll">
            <div class="ada-chat-inner">
              <div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn sm" type="button" onclick="clearAdaConversation()">Clear conversation</button></div>
              <div class="ada-chat-log" id="chatLog"></div>
              <div class="ada-starters" id="adaStarters">
                <button class="ada-starter" type="button" onclick="primeAda(&quot;Which companies are behind on payment or need attention right now?&quot;)"><b>Companies needing attention</b>Payment issues, pending approvals, flagged accounts</button>
                <button class="ada-starter" type="button" onclick="primeAda(&quot;Summarize recent pipeline activity and where deals stand.&quot;)"><b>Pipeline summary</b>Where deals stand and what moved recently</button>
                <button class="ada-starter" type="button" onclick="primeAda(&quot;What is unread in the support inbox right now?&quot;)"><b>Support inbox</b>What is unread and needs a reply</button>
                <button class="ada-starter" type="button" onclick="primeAda(&quot;Give me a quick read on overall platform health.&quot;)"><b>Platform health</b>Companies, plans, and anything flagged</button>
              </div>
            </div>
          </div>
          <form class="ada-composer" onsubmit="return sendChat(event)">
            <div class="ada-composer-inner">
              <div class="ada-attach-row" id="chatAttachRow"></div>
              <div class="ada-box">
                <button class="icobtn" type="button" onclick="document.getElementById('chatFile').click()" title="Attach a document" aria-label="Attach a document" style="width:32px;height:32px;flex:none;margin-bottom:1px">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <input type="file" id="chatFile" accept=".txt,.md,.csv" multiple hidden onchange="attachChatFiles(event)">
                <textarea id="chatInput" rows="1" placeholder="Ask Ada about companies, payments, pipeline…" oninput="autoGrowChat(this)" onkeydown="chatKey(event)"></textarea>
                <button class="ada-send" type="submit" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4Z"/></svg></button>
              </div>
              <div class="ada-composer-foot">
                <span>Ada never changes anything in the Command Center on her own.</span>
                <span>Grounded in your role's view · Enter to send</span>
              </div>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
  let currentAdmin = null;
  let chatHistory = [];
  let pendingAttachments = [];

  function toggleTheme() {
    const root = document.documentElement;
    const cur = root.getAttribute('data-theme') ||
      ((matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
    const next = cur === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('buinee-admin-theme', next);
  }

  async function logout() {
    await fetch('/api/admin/logout', { method: 'POST', credentials: 'same-origin' });
    location.href = '/admin/login';
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
  }

  function chatMarkdown(text) {
    return escapeHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
      .replace(/(^|\s)\*(?!\s)(.+?)\*(?=\s|$|[.,!?])/g, '$1<i>$2</i>')
      .replace(/\n/g, '<br>');
  }

  function adaConversationKey() {
    return `buinee.adminAdaConversation.${currentAdmin.id}`;
  }

  function loadAdaConversation() {
    try {
      const saved = JSON.parse(localStorage.getItem(adaConversationKey()) || '[]');
      chatHistory = Array.isArray(saved)
        ? saved.filter(item => item && ['user', 'assistant'].includes(item.role) && typeof item.content === 'string').slice(-50)
        : [];
    } catch { chatHistory = []; }
  }

  function saveAdaConversation() {
    if (!currentAdmin) return;
    localStorage.setItem(adaConversationKey(), JSON.stringify(chatHistory.slice(-50)));
  }

  function clearAdaConversation() {
    if (!confirm('Clear your conversation with Ada? This only removes your own saved Ada chat.')) return;
    chatHistory = [];
    pendingAttachments = [];
    localStorage.removeItem(adaConversationKey());
    renderChatAttachments();
    renderChatLog();
  }

  function renderChatLog() {
    const box = document.getElementById('chatLog');
    const first = (currentAdmin.name || '').split(/\s+/)[0] || 'there';
    const welcome = `<div class="ada-msg ai"><div class="av">A</div><div class="bub">Hi ${escapeHtml(first)} — I'm <b>Ada</b>. Ask me about companies, payments, the pipeline, or anything else your Command Center role can see.</div></div>`;
    box.innerHTML = welcome + chatHistory.map(m => {
      const mine = m.role === 'user';
      const docs = (m.docs || []).length
        ? `<span class="meta">Attached: ${m.docs.map(escapeHtml).join(', ')}</span>` : '';
      return `<div class="ada-msg ${mine ? 'me' : 'ai'}"><div class="av">${mine ? escapeHtml(initials(currentAdmin.name || 'You')) : 'A'}</div><div class="bub">${mine ? escapeHtml(m.content).replace(/\n/g, '<br>') : chatMarkdown(m.content)}${docs}</div></div>`;
    }).join('');
    const starters = document.getElementById('adaStarters');
    if (starters) starters.hidden = chatHistory.length > 0;
    const scroll = document.getElementById('chatScroll');
    scroll.scrollTop = scroll.scrollHeight;
  }

  function autoGrowChat(input) {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }

  function chatKey(ev) {
    if (ev.key === 'Enter' && !ev.shiftKey) {
      ev.preventDefault();
      ev.target.closest('form').requestSubmit();
    }
  }

  function attachChatFiles(ev) {
    const files = [...ev.target.files].slice(0, Math.max(0, 3 - pendingAttachments.length));
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = () => {
        pendingAttachments.push({ name: file.name, text: String(reader.result || '').slice(0, 20000) });
        renderChatAttachments();
      };
      reader.readAsText(file);
    });
    ev.target.value = '';
  }

  function renderChatAttachments() {
    document.getElementById('chatAttachRow').innerHTML = pendingAttachments.map((file, index) => `
      <span class="ada-attach-chip">📎 ${escapeHtml(file.name)}<button type="button" onclick="removeAttachment(${index})" aria-label="Remove ${escapeHtml(file.name)}">×</button></span>
    `).join('');
  }

  function removeAttachment(index) {
    pendingAttachments.splice(index, 1);
    renderChatAttachments();
  }

  function primeAda(prompt) {
    const input = document.getElementById('chatInput');
    input.value = prompt;
    autoGrowChat(input);
    input.focus();
  }

  async function sendChat(ev) {
    ev.preventDefault();
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text && !pendingAttachments.length) return false;

    const attachments = pendingAttachments.slice();
    const message = text || 'Please assess the attached document.';
    chatHistory.push({ role: 'user', content: message, docs: attachments.map(file => file.name) });
    saveAdaConversation();
    input.value = '';
    autoGrowChat(input);
    pendingAttachments = [];
    renderChatAttachments();
    renderChatLog();
    const box = document.getElementById('chatLog');
    box.insertAdjacentHTML('beforeend', '<div class="ada-msg ai" id="chatPending"><div class="av">A</div><div class="bub" aria-label="Ada is typing"><span class="typing"><i></i><i></i><i></i></span></div></div>');
    const scroll = document.getElementById('chatScroll');
    scroll.scrollTop = scroll.scrollHeight;

    try {
      const res = await fetch('/api/admin/chat', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message,
          history: chatHistory.slice(0, -1).map(({ role, content }) => ({ role, content })),
          docs: attachments,
        }),
      });
      const data = await res.json();
      chatHistory.push({ role: 'assistant', content: res.ok ? data.reply : (data.error || 'Could not reach the assistant.') });
      saveAdaConversation();
    } catch {
      chatHistory.push({ role: 'assistant', content: 'Could not reach the server.' });
      saveAdaConversation();
    }
    renderChatLog();
    return false;
  }

  async function main() {
    let admin;
    try {
      const res = await fetch('/api/admin/me', { credentials: 'same-origin' });
      if (!res.ok) throw new Error();
      admin = (await res.json()).admin;
    } catch { location.href = '/admin/login'; return; }

    currentAdmin = admin;
    loadAdaConversation();
    renderChatLog();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('viewChat').hidden = false;
  }

  main();
</script>
