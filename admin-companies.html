<meta charset="utf-8">
<title>Companies — Command Center — Buinee</title>
<meta name="description" content="Every company registered on Buinee, with its Supervisor and full team.">
<style>
  :root {
    --paper: #f6f4ef; --surface: #ffffff; --surface-2: #efece5;
    --line: #dedad0; --line-strong: #c9c4b7;
    --ink: #101619; --ink-2: #3c4750; --ink-3: #6a747c; --ink-4: #949ba1;
    --teal: #0e5d57; --teal-deep: #0a4340; --teal-soft: #dfece9;
    --warn: #b07d1b; --warn-soft: #f8eed6;
    --bad: #b0301f; --bad-soft: #fbe6e2;
    --violet: #6b5be6; --violet-soft: #ecebfc;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(16,22,25,.05), 0 14px 34px rgba(16,22,25,.07);
    --sans: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --mono: "SFMono-Regular", ui-monospace, "Cascadia Code", Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #0e1315; --surface: #151b1e; --surface-2: #1c2427; --line: #262f33;
      --line-strong: #354046; --ink: #eef1f0; --ink-2: #bcc5c7; --ink-3: #8b9599; --ink-4: #6b7478;
      --teal: #4fb3a6; --teal-deep: #6fcbbd; --teal-soft: #10312e;
      --warn: #d09b3c; --warn-soft: #2a2113;
      --bad: #e07a68; --bad-soft: #341714;
      --violet: #9b8ff2; --violet-soft: #201c3d;
      --shadow: 0 1px 2px rgba(0,0,0,.5), 0 14px 34px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="dark"] {
    --paper: #0e1315; --surface: #151b1e; --surface-2: #1c2427; --line: #262f33;
    --line-strong: #354046; --ink: #eef1f0; --ink-2: #bcc5c7; --ink-3: #8b9599; --ink-4: #6b7478;
    --teal: #4fb3a6; --teal-deep: #6fcbbd; --teal-soft: #10312e;
    --warn: #d09b3c; --warn-soft: #2a2113;
    --bad: #e07a68; --bad-soft: #341714;
    --violet: #9b8ff2; --violet-soft: #201c3d;
    --shadow: 0 1px 2px rgba(0,0,0,.5), 0 14px 34px rgba(0,0,0,.4);
  }
  :root[data-theme="light"] {
    --paper: #f6f4ef; --surface: #ffffff; --surface-2: #efece5; --line: #dedad0;
    --line-strong: #c9c4b7; --ink: #101619; --ink-2: #3c4750; --ink-3: #6a747c; --ink-4: #949ba1;
    --teal: #0e5d57; --teal-deep: #0a4340; --teal-soft: #dfece9;
    --warn: #b07d1b; --warn-soft: #f8eed6;
    --bad: #b0301f; --bad-soft: #fbe6e2;
    --violet: #6b5be6; --violet-soft: #ecebfc;
    --shadow: 0 1px 2px rgba(16,22,25,.05), 0 14px 34px rgba(16,22,25,.07);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: var(--sans); font-size: 16px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  h1,h3,h4 { margin: 0; font-weight: 600; letter-spacing: -.02em; }
  p { margin: 0; }
  button { font-family: inherit; font-size: inherit; }
  :focus-visible { outline: 2px solid var(--violet); outline-offset: 2px; border-radius: 4px; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

  .shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 232px; flex: none; background: var(--surface); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; padding: 20px 14px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; padding: 0 8px; }
  .sidebar-brand .mark {
    width: 30px; height: 30px; border-radius: 8px; flex: none; display: grid; place-items: center;
    background: linear-gradient(140deg, var(--violet), #453aa8); color: #fff;
  }
  .sidebar-brand .mark svg { width: 16px; height: 16px; }
  .sidebar-brand .name { font-family: var(--serif); font-size: 18px; font-weight: 600; }
  .sidebar-tag {
    font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--violet); padding: 3px 8px; margin: 6px 0 18px;
  }
  .sidebar-nav { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .sidebar-link {
    display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 9px;
    font-size: 14px; font-weight: 600; color: var(--ink-2); text-decoration: none; cursor: pointer;
    border: none; background: none; width: 100%; text-align: left;
  }
  .sidebar-link svg { width: 17px; height: 17px; flex: none; }
  .sidebar-link:hover { background: var(--surface-2); color: var(--ink); }
  .sidebar-link.active { background: var(--violet-soft); color: var(--violet); }
  .sidebar-foot {
    border-top: 1px solid var(--line); margin-top: 10px; padding-top: 10px;
    display: flex; flex-direction: column; gap: 3px;
  }

  .content { flex: 1; min-width: 0; }
  main { padding: 36px 0 70px; }
  .hero-line { margin-bottom: 28px; }
  .hero-line .eyebrow { font-size: 11.5px; letter-spacing: .13em; text-transform: uppercase; font-weight: 700; color: var(--violet); }
  .hero-line h1 { font-family: var(--serif); font-size: 28px; margin: 8px 0 6px; }
  .hero-line p { font-size: 15px; color: var(--ink-2); max-width: 60ch; }

  .panel {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px;
  }
  .panel h3 { font-size: 15.5px; margin-bottom: 4px; }
  .panel .sub { font-size: 12.5px; color: var(--ink-3); margin-bottom: 16px; }

  .companies-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px;
  }
  .company-card {
    border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; cursor: pointer;
  }
  .company-card:hover { border-color: var(--violet); }
  .company-card.expanded { grid-column: 1 / -1; cursor: default; }
  .company-card.expanded:hover { border-color: var(--line); }
  .card-summary { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .card-summary .info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .card-summary .name {
    font-family: var(--serif); font-size: 15px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-summary .meta { font-size: 11.5px; color: var(--ink-3); line-height: 1.4; }
  .card-summary .counts { display: flex; align-items: center; gap: 8px; flex: none; }
  .chevron { width: 15px; height: 15px; color: var(--ink-4); transition: transform .12s; flex: none; }
  .company-card.expanded .chevron { transform: rotate(90deg); }
  .no-super { color: var(--ink-3); font-style: italic; }

  .card-detail { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--line); }
  .company-card.expanded .card-detail { display: block; }
  .supervisor-line { font-size: 13px; color: var(--ink-2); margin-bottom: 14px; }
  .supervisor-line b { color: var(--ink); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .detail-grid h4 { font-size: 12.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-3); margin-bottom: 10px; }
  .mini-row { display: flex; justify-content: space-between; gap: 10px; padding: 7px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
  .mini-row:last-child { border-bottom: none; }
  .mini-row .who { display: flex; flex-direction: column; }
  .mini-row .who span { font-size: 11.5px; color: var(--ink-3); }
  .role-badge {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    padding: 3px 7px; border-radius: 20px; background: var(--teal-soft); color: var(--teal-deep); white-space: nowrap;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 8px 14px; border-radius: 9px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--line-strong); background: var(--surface); color: var(--ink); cursor: pointer;
  }
  .btn:hover { border-color: var(--violet); color: var(--violet); }
  .btn.sm { padding: 6px 11px; font-size: 12px; }
  .msg.error { color: var(--bad); font-size: 12px; }

  .plan-change {
    margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--line);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 13px;
  }
  .plan-change label { font-weight: 600; color: var(--ink-2); }
  .plan-change select {
    padding: 7px 10px; border-radius: 8px; border: 1px solid var(--line-strong);
    background: var(--paper); color: var(--ink); font-size: 12.5px; max-width: 260px;
  }

  .danger-zone {
    margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .btn-delete {
    padding: 7px 14px; border-radius: 9px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--bad); background: var(--bad-soft); color: var(--bad); cursor: pointer;
  }
  .btn-delete:hover { background: var(--bad); color: #fff; }
  .danger-note { font-size: 11.5px; color: var(--ink-3); }
  .empty-mini { font-size: 12.5px; color: var(--ink-3); padding: 6px 0; }
  .count-badge {
    display: inline-flex; align-items: center; justify-content: center; min-width: 22px; padding: 2px 7px;
    border-radius: 20px; font-size: 12px; font-weight: 700; font-family: var(--mono);
    background: var(--surface-2); color: var(--ink-2);
  }
  .count-badge.warn { background: var(--warn-soft); color: var(--warn); }

  #loading { padding: 80px 0; text-align: center; color: var(--ink-3); font-size: 14px; }

  @media (max-width: 640px) {
    .companies-grid { grid-template-columns: 1fr; }
    .sidebar { width: 64px; padding: 16px 8px; }
    .sidebar-brand { justify-content: center; padding: 0; }
    .sidebar-brand .name, .sidebar-tag, .sidebar-link .label { display: none; }
    .sidebar-link { justify-content: center; padding: 10px; }
    .detail-grid { grid-template-columns: 1fr; gap: 14px; }
  }
</style>

<div class="shell">
  <aside class="sidebar">
    <a class="sidebar-brand" href="/admin.html">
      <span class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </span>
      <span class="name">Buinee</span>
    </a>
    <div class="sidebar-tag">Command Center</div>
    <nav class="sidebar-nav">
      <a class="sidebar-link" href="/admin.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        <span class="label">Overview</span>
      </a>
      <a class="sidebar-link active" href="/admin-companies.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M6 21V7a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v14"/><path d="M14 21V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v17"/></svg>
        <span class="label">Companies</span>
      </a>
      <a class="sidebar-link" href="/admin-plans.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span class="label">Plans</span>
      </a>
      <a class="sidebar-link" href="/admin-settings.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
        <span class="label">Settings</span>
      </a>
    </nav>
    <div class="sidebar-foot">
      <button class="sidebar-link" onclick="toggleTheme()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <span class="label">Toggle theme</span>
      </button>
      <button class="sidebar-link" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        <span class="label">Sign out</span>
      </button>
    </div>
  </aside>

  <div class="content">
    <main>
      <div class="wrap">
        <div id="loading">Loading companies…</div>

        <div id="content" style="display:none">
          <div class="hero-line">
            <span class="eyebrow">Every company, in full</span>
            <h1>Companies</h1>
            <p>Every company registered on Buinee. Click one to see its Supervisor's full details, team and pending list.</p>
          </div>

          <div class="panel">
            <div id="companyCards" class="companies-grid"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  function toggleTheme() {
    const root = document.documentElement;
    const cur = root.getAttribute('data-theme') ||
      (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    root.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
  }

  async function logout() {
    await fetch('/api/admin/logout', { method: 'POST', credentials: 'same-origin' });
    location.href = '/admin-login.html';
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }

  function fmtDate(epochSeconds) {
    return new Date(epochSeconds * 1000).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }

  const ROLE_LABELS = {
    account_assistant: 'Preparer',
    senior_accountant: 'Approver',
    finance_supervisor: 'Supervisor',
  };

  let allPlans = [];

  async function main() {
    try {
      const res = await fetch('/api/admin/me', { credentials: 'same-origin' });
      if (!res.ok) { location.href = '/admin-login.html'; return; }
    } catch { location.href = '/admin-login.html'; return; }

    let overview;
    try {
      const [overviewRes, plansRes] = await Promise.all([
        fetch('/api/admin/overview', { credentials: 'same-origin' }),
        fetch('/api/admin/plans', { credentials: 'same-origin' }),
      ]);
      if (!overviewRes.ok) { throw new Error(); }
      overview = await overviewRes.json();
      allPlans = plansRes.ok ? (await plansRes.json()).plans : [];
    } catch {
      document.getElementById('loading').textContent = 'Could not load companies.';
      return;
    }

    renderCompanies(overview.companies);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  }

  let lastCompanies = [];

  // A solo workspace is permanently "1/1 users". Flag either somebody
  // waiting to join or an Individual workspace that already has extra
  // approved members, since only this page can correct the plan.
  function planSummary(c) {
    if (c.plan.audience !== 'individual') {
      const atLimit = c.approved_count >= c.plan.user_limit;
      return `(${c.approved_count}/${c.plan.user_limit} users)` +
        (atLimit ? ' <span class="no-super">— at limit</span>' : '');
    }
    if (!c.needs_team_plan) return '(one person)';
    const approved = c.approved_count > 1 ? `${c.approved_count} approved` : 'one approved';
    const waiting = c.pending_count ? ` + ${c.pending_count} waiting` : '';
    return `(${approved}${waiting}) <span class="no-super">— move to a Team tier</span>`;
  }

  function renderCompanies(companies) {
    lastCompanies = companies;
    const box = document.getElementById('companyCards');
    if (!companies.length) {
      box.innerHTML = '<div class="empty-mini">No companies registered yet.</div>';
      return;
    }
    // Newest first.
    box.innerHTML = companies.slice().reverse().map(c => `
      <div class="company-card" id="card-${c.id}" tabindex="0" role="button" aria-expanded="false"
           onclick="toggleCard(${c.id})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleCard(${c.id});}">
        <div class="card-summary">
          <div class="info">
            <span class="name" title="${escapeHtml(c.name)}">${escapeHtml(c.name)}</span>
            <span class="meta">Registered ${fmtDate(c.created_at)}</span>
            <span class="meta">${c.supervisor
              ? `Supervisor: ${escapeHtml(c.supervisor.name)}`
              : '<span class="no-super">no Supervisor yet</span>'}</span>
            <span class="meta">Plan: <b>${escapeHtml(c.plan.name)}</b> ${planSummary(c)}</span>
          </div>
          <div class="counts">
            <span class="count-badge" title="Approved employees">${c.approved_count}</span>
            <span class="count-badge ${c.pending_count ? 'warn' : ''}" title="Pending requests">${c.pending_count}</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
          </div>
        </div>
        <div class="card-detail">
          ${c.supervisor
            ? `<div class="supervisor-line">Supervisor: <b>${escapeHtml(c.supervisor.name)}</b> · ${escapeHtml(c.supervisor.email)}</div>`
            : '<div class="supervisor-line"><span class="no-super">No Supervisor yet</span></div>'}
          ${renderTeamAndPending(c)}
          <div class="plan-change" onclick="event.stopPropagation()">
            <label for="planSelect-${c.id}">Change plan</label>
            <select id="planSelect-${c.id}">
              ${allPlans.map(p => `<option value="${p.id}" ${p.id === c.plan.id ? 'selected' : ''}>${p.audience === 'individual' ? 'Individual' : 'Team'} — ${escapeHtml(p.name)} (${p.user_limit} ${p.user_limit === 1 ? 'user' : 'users'}) — ${escapeHtml(p.currency)} ${p.price}/mo</option>`).join('')}
            </select>
            <button class="btn sm" onclick="changePlan(${c.id})">Move</button>
            <span class="msg error" id="planError-${c.id}" style="display:inline-block;margin:0"></span>
          </div>
          <div class="danger-zone">
            <button class="btn-delete" onclick="event.stopPropagation(); deleteCompany(${c.id})">
              Delete company
            </button>
            <span class="danger-note">Permanently removes this company and everyone in it. Cannot be undone.</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function toggleCard(id) {
    const card = document.getElementById(`card-${id}`);
    const expanded = card.classList.toggle('expanded');
    card.setAttribute('aria-expanded', String(expanded));
  }

  async function deleteCompany(id) {
    const company = lastCompanies.find(c => c.id === id);
    const name = company ? company.name : 'this company';
    if (!confirm(`Delete "${name}" and everyone in it? This cannot be undone.`)) return;
    try {
      const res = await fetch('/api/admin/company/delete', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company_id: id }),
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Could not delete company.'); return; }
      document.getElementById(`card-${id}`).remove();
    } catch {
      alert('Could not reach the server.');
    }
  }

  async function changePlan(id) {
    const errBox = document.getElementById(`planError-${id}`);
    errBox.textContent = '';
    const planId = parseInt(document.getElementById(`planSelect-${id}`).value, 10);
    try {
      const res = await fetch('/api/admin/company/set-plan', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company_id: id, plan_id: planId }),
      });
      const data = await res.json();
      if (!res.ok) { errBox.textContent = data.error || 'Could not change plan.'; return; }
      const wasExpanded = document.getElementById(`card-${id}`).classList.contains('expanded');
      await main();
      if (wasExpanded) {
        const card = document.getElementById(`card-${id}`);
        if (card) { card.classList.add('expanded'); card.setAttribute('aria-expanded', 'true'); }
      }
    } catch {
      errBox.textContent = 'Could not reach the server.';
    }
  }

  function renderTeamAndPending(c) {
    const team = c.team.map(u => `
      <div class="mini-row">
        <div class="who"><b>${escapeHtml(u.name)}</b><span>${escapeHtml(u.email)}</span></div>
        <span class="role-badge">${ROLE_LABELS[u.role] || u.role}</span>
      </div>
    `).join('') || '<div class="empty-mini">No one approved yet.</div>';

    const pending = c.pending.map(u => `
      <div class="mini-row">
        <div class="who"><b>${escapeHtml(u.name)}</b><span>${escapeHtml(u.email)}</span></div>
        <span class="role-badge" style="background:var(--warn-soft);color:var(--warn)">${ROLE_LABELS[u.role] || u.role}</span>
      </div>
    `).join('') || '<div class="empty-mini">Nobody waiting.</div>';

    return `
      <div class="detail-grid">
        <div><h4>Team (${c.approved_count})</h4>${team}</div>
        <div><h4>Pending (${c.pending_count})</h4>${pending}</div>
      </div>
    `;
  }

  main();
</script>
