<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Error logs · Buinee</title><style>:root{--p:#f6f4ef;--s:#fff;--l:#dedad0;--i:#101619;--m:#6a747c;--g:#0e5d57;--gs:#dfece9;--r:#b0301f}*{box-sizing:border-box}body{margin:0;background:var(--p);color:var(--i);font:14px Segoe UI,system-ui}.shell{display:flex;min-height:100vh}.side{width:232px;padding:20px 14px;background:var(--s);border-right:1px solid var(--l)}.brand{display:block;padding:8px;color:var(--i);font:600 20px Georgia;text-decoration:none}.brand small{display:block;color:var(--g);font:800 10px Segoe UI;text-transform:uppercase}.nav{display:grid;margin-top:20px}.nav a{padding:10px 12px;border-radius:9px;color:#3c4750;font-weight:650;text-decoration:none}.nav a:hover,.nav .on{background:var(--gs);color:var(--g)}main{flex:1;padding:38px}.wrap{max-width:1100px;margin:auto}h1{font:600 30px Georgia;margin:5px 0}.eye{color:var(--g);font-size:11px;font-weight:800;text-transform:uppercase}.tools{display:flex;gap:8px;margin:22px 0}.tools input,.tools select,.btn{padding:9px 11px;border:1px solid var(--l);border-radius:9px;background:var(--s)}.tools input{flex:1}.btn{font-weight:700;cursor:pointer}.danger{color:var(--r)}.logs{display:grid;gap:9px}.log{padding:15px;border:1px solid var(--l);border-left:4px solid var(--r);border-radius:10px;background:var(--s)}.log header{display:flex;justify-content:space-between}.log small,.empty{color:var(--m)}.log pre{white-space:pre-wrap;overflow-wrap:anywhere;font:12px Consolas}.empty{padding:45px;text-align:center;border:1px solid var(--l);border-radius:12px;background:var(--s)}@media(max-width:700px){.side{width:74px}.brand{font-size:0}.brand:before{content:'B';font-size:20px}.brand small,.nav a{font-size:0}.nav a:before{content:'•';font-size:18px}main{padding:24px 14px}.tools{flex-wrap:wrap}}</style></head><body><div class="shell"><aside class="side"><a class="brand" href="/admin.html">Buinee<small>Command Center</small></a><nav class="nav"><a href="/admin.html">Overview</a><a href="/admin-companies.html">Companies</a><a href="/admin-payments.html">Payments</a><a href="/admin-team.html">Back-office team</a><a href="/admin-activity.html">Activity log</a><a class="on" href="/admin-errors.html">Error logs</a><a href="/admin-settings.html">Settings</a><a href="/" target="_blank">View site</a></nav></aside><main><div class="wrap"><div class="eye">System diagnostics</div><h1>Error logs</h1><p>Application errors captured by Buinee appear here without exposing logs publicly.</p><div class="tools"><input id="q" placeholder="Search errors"><select id="limit"><option>100</option><option selected>300</option><option>500</option><option>1000</option></select><button class="btn" onclick="load()">Search</button><button class="btn danger" onclick="clearLogs()">Clear logs</button></div><div class="logs" id="logs"><div class="empty">Loading logs…</div></div></div></main></div><script>const e=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));async function load(){let r=await fetch('/api/admin/errors?'+new URLSearchParams({query:q.value,limit:limit.value}),{credentials:'same-origin'});if(r.status===401)return location.href='/admin-login.html';let d=await r.json();logs.innerHTML=d.errors?.length?d.errors.map(x=>`<article class="log"><header><b>${e(x.source)} · ${e(x.severity)}</b><small>${new Date(x.created_at*1000).toLocaleString()}</small></header><p>${e(x.message)}</p>${x.details?`<pre>${e(x.details)}</pre>`:''}</article>`).join(''):'<div class="empty">No captured application errors. That is a good sign.</div>'}async function clearLogs(){if(!confirm('Clear all stored error logs?'))return;let r=await fetch('/api/admin/errors/clear',{method:'POST',credentials:'same-origin'});if(r.ok)load()}load()</script></body></html>
