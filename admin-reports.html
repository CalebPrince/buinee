<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Reports · Buinee</title><style>:root{--p:#f6f4ef;--s:#fff;--s2:#efece5;--l:#dedad0;--i:#101619;--m:#6a747c;--g:#0e5d57;--gs:#dfece9}*{box-sizing:border-box}body{margin:0;background:var(--p);color:var(--i);font:14px Segoe UI,system-ui}.shell{display:flex;min-height:100vh}.side{width:232px;padding:20px 14px;background:var(--s);border-right:1px solid var(--l)}.brand{display:block;padding:8px;color:var(--i);font:600 20px Georgia;text-decoration:none}.brand small{display:block;color:var(--g);font:800 10px Segoe UI;text-transform:uppercase}.nav{display:grid;margin-top:20px}.nav a{padding:10px 12px;border-radius:9px;color:#3c4750;font-weight:650;text-decoration:none}.nav a:hover,.on{background:var(--gs);color:var(--g)!important}main{flex:1;padding:38px}.wrap{max-width:1150px;margin:auto}.eye{color:var(--g);font-size:11px;font-weight:800;text-transform:uppercase}h1{font:600 30px Georgia;margin:5px 0}.muted{color:var(--m)}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:24px 0}.card{padding:17px;border:1px solid var(--l);border-radius:13px;background:var(--s)}.card b{display:block;font:600 22px Georgia}.card span{color:var(--m);font-size:11px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.panel{border:1px solid var(--l);border-radius:13px;background:var(--s);overflow:hidden}.panel h2{margin:0;padding:15px 17px;border-bottom:1px solid var(--l);font:600 17px Georgia}.rows{padding:8px 17px}.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--l)}.row:last-child{border:0}.money{font-family:Consolas;font-weight:700}@media(max-width:760px){.side{width:74px}.brand{font-size:0}.brand:before{content:'B';font-size:20px}.brand small,.nav a{font-size:0}.nav a:before{content:'•';font-size:18px}main{padding:24px 14px}.kpis,.grid{grid-template-columns:1fr}}</style></head><body><div class="shell"><aside class="side"><a class="brand" href="/admin.html">Buinee<small>Command Center</small></a><nav class="nav"><a href="/admin.html">Overview</a><a class="on" href="/admin-reports.html">Reports</a><a href="/admin-companies.html">Companies</a><a href="/admin-pipeline.html">Pipeline</a><a href="/admin-payments.html">Payments</a><a href="/admin-activity.html">Activity log</a><a href="/admin-errors.html">Error logs</a><a href="/" target="_blank">View site</a></nav></aside><main><div class="wrap"><div class="eye">Business direction</div><h1>Reports</h1><p class="muted">Verified cash and pipeline forecasts are shown separately.</p><div class="kpis" id="kpis"></div><div class="grid"><section class="panel"><h2>Verified Paystack revenue</h2><div class="rows" id="revenue"></div></section><section class="panel"><h2>Open pipeline forecast</h2><div class="rows" id="forecast"></div></section><section class="panel"><h2>Companies by plan</h2><div class="rows" id="plans"></div></section><section class="panel"><h2>Customer lifecycle</h2><div class="rows" id="lifecycle"></div></section></div></div></main></div><script>const money=(n,c)=>`${c} ${(n/100).toLocaleString(undefined,{minimumFractionDigits:2})}`,rows=(id,o,fn=(v,k)=>v)=>document.getElementById(id).innerHTML=Object.entries(o).map(([k,v])=>`<div class="row"><span>${k.replaceAll('_',' ')}</span><b class="money">${fn(v,k)}</b></div>`).join('')||'<div class="row muted">No data yet</div>';fetch('/api/admin/reports',{credentials:'same-origin'}).then(r=>{if(r.status===401)location.href='/admin-login.html';return r.json()}).then(d=>{kpis.innerHTML=`<div class="card"><b>${d.companies}</b><span>Companies</span></div><div class="card"><b>${d.members}</b><span>Approved users</span></div><div class="card"><b>${Object.keys(d.revenue).length}</b><span>Revenue currencies</span></div><div class="card"><b>${d.opportunities.length}</b><span>Pipeline records shown</span></div>`;rows('revenue',d.revenue,money);rows('forecast',d.forecast,money);rows('plans',d.plans);rows('lifecycle',d.lifecycle)})</script></body></html>
