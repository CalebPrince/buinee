e"><a class="brand" href="/admin.html">Buinee<small>Command Center</small></a><nav class="nav"><a href="/admin.html">Overview</a><a class="on" href="/admin-reports.html">Reports</a><a href="/admin-companies.html">Companies</a><a href="/admin-pipeline.html">Pipeline</a><a href="/admin-payments.html">Payments</a><a href="/admin-activity.html">Activity log</a><a href="/admin-errors.html">Error logs</a><a href="/" target="_blank">View site</a></nav></aside><main><div class="wrap"><div class="eye">Business direction</div><h1>Reports</h1><p class="muted">Verified cash and pipeline forecasts are shown separately.</p><div class="kpis" id="kpis"></div><div class="grid"><section class="panel"><h2>Verified Paystack revenue</h2><div class="rows" id="revenue"></div></section><section class="panel"><h2>Open pipeline forecast</h2><div class="rows" id="forecast"></div></section><section class="panel"><h2>Companies by plan</h2><div class="rows" id="plans"></div></section><section class="panel"><h2>Customer lifecycle</h2><div class="rows" id="lifecycle"></div></section></div></div></main></div><script>const money=(n,c)=>`${c} ${(n/100).toLocaleString(undefined,{minimumFractionDigits:2})}`,rows=(id,o,fn=(v,k)=>v)=>document.getElementById(id).innerHTML=Object.entries(o).map(([k,v])=>`<div class="row"><span>${k.replaceAll('_',' ')}</span><b class="money">${fn(v,k)}</b></div>`).join('')||'<div class="row muted">No data yet</div>';fetch('/api/admin/reports',{credentials:'same-origin'}).then(r=>{if(r.status===401)location.href='/admin-login.html';return r.json()}).then(d=>{kpis.innerHTML=`<div class="card"><b>${d.companies}</b><span>Companies</span></div><div class="card"><b>${d.members}</b><span>Approved users</span></div><div class="card"><b>${Object.keys(d.revenue).length}</b><span>Revenue currencies</span></div><div class="card"><b>${d.opportunities.length}</b><span>Pipeline records shown</span></div>`;rows('revenue',d.revenue,money);rows('forecast',d.forecast,money);rows('plans',d.pla
