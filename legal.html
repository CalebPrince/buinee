const brandStyle=document.createElement('style');brandStyle.textContent=`:root{--violet:#0e5d57;--soft:#dfece9;--teal-deep:#0a4340}.brand{display:flex;align-items:center;gap:10px}.brand-mark{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;background:linear-gradient(140deg,#0e5d57,#0a4340);color:#fff}.brand-mark svg{width:16px;height:16px}.brand-name{font:600 19px var(--serif);letter-spacing:-.02em}`;document.head.appendChild(brandStyle);document.querySelector('.brand').innerHTML='<span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h11"/></svg></span><span class="brand-name">Buinee</span>';

const docs={
privacy:{title:'Privacy Policy',intro:'This policy explains what personal data Buinee handles, why it is used, who receives it, and the choices available to you.',body:`
<div class="notice">Buinee is a working name operated by princecaleb.dev. Before commercial launch, the operator’s registered legal name, registration number, physical address, and dedicated privacy email should be added here.</div>
<h2>1. Scope and roles</h2><p>This policy applies to Buinee’s website, company workspaces, Command Center, mailbox connections, AI features, payments, and support interactions. A subscribing company controls the business records its users place in its workspace. Buinee processes those records to provide the service and separately controls account, security, billing, and service-operation data.</p>
<h2>2. Data we collect</h2><ul><li>Identity and account data: name, work email, role, company, login and approval status.</li><li>Workspace data: vouchers, documents, instructions, chat messages, CRM records, tasks, approvals, and audit events.</li><li>Connected-source data: mailbox identifiers, message headers and content requested for a feature, plus encrypted connection credentials. OAuth tokens are encrypted at rest.</li><li>Billing data: plan, payment reference, amount, currency, status, and Paystack-provided masked payment metadata. Buinee does not store full card numbers or CVVs.</li><li>Technical data: sessions, presence, IP address where needed for abuse protection, timestamps, and error/security logs.</li></ul>
<h2>3. Why we use it</h2><p>We use data to create and secure accounts, provide the requested workflow, isolate companies, process approvals and payments, connect selected services, provide support, detect abuse, maintain audit trails, and comply with law. We do not sell personal data.</p>
<h2>4. AI and connected services</h2><p>When a company enables an AI provider, relevant prompts and selected workspace content may be sent to that provider to produce the requested result. Mailbox access is used only for enabled features and credentials are not shown to other users. Companies should not upload data they lack authority to process.</p>
<h2>5. Sharing and international processing</h2><p>Data may be processed by hosting, email/OAuth, AI, and payment providers necessary to deliver the service, including Microsoft, Google, configured AI providers, and Paystack. We may disclose data when required by law, to protect users or the service, or during a properly governed business transfer.</p>
<h2>6. Retention and deletion</h2><p>We keep data while an account is active and as reasonably necessary for security, billing, disputes, legal duties, and backups. Workspace administrators control much of their company data. Deleting a company is permanent in the active database; limited backup copies may remain until normal backup rotation completes.</p>
<h2>7. Your rights</h2><p>Under Ghana’s Data Protection Act, 2012 (Act 843), individuals may have rights to be informed, access personal data, request correction or deletion, object to specified processing or direct marketing, and complain to Ghana’s Data Protection Commission. Requests may be made through the contact channel at <a href="https://princecaleb.dev">princecaleb.dev</a>. We may verify identity and authority before acting.</p>
<h2>8. Security and changes</h2><p>We use access controls, company scoping, encrypted mailbox credentials, signed payment webhooks, and audit records. No system is risk-free. Material policy changes will be posted here with a revised date.</p>`},
terms:{title:'Terms of Use',intro:'These terms govern access to Buinee’s website and business workspace.',body:`<div class="notice">Buinee is a working name operated by princecaleb.dev. These terms should be reviewed by Ghana-qualified counsel and completed with the operator’s registered details before commercial launch.</div><h2>1. Agreement and authority</h2><p>By creating or using an account, you accept these terms and confirm that you are legally able and authorised by your company to do so. A company Supervisor administers membership and company information.</p><h2>2. The service</h2><p>Buinee provides back-office workflows, approvals, mailbox tools, AI assistance, CRM, team collaboration, and related features. Features and plan limits may change; material reductions to a paid service will be communicated reasonably.</p><h2>3. Your responsibilities</h2><ul><li>Provide accurate information and protect login credentials.</li><li>Use only data and connected accounts you are authorised to access.</li><li>Review AI output, calculations, drafts, payments, and business decisions before relying on or sending them.</li><li>Comply with applicable employment, privacy, tax, accounting, communications, and industry rules.</li></ul><h2>4. Prohibited use</h2><p>Do not break access controls, probe or overload the service, upload malware, impersonate others, infringe rights, send unlawful or deceptive communications, scrape the service, or use it to make unlawful automated decisions.</p><h2>5. AI and financial workflows</h2><p>AI output may be incomplete or wrong and is not legal, tax, audit, investment, or accounting advice. Buinee’s deterministic calculations reduce arithmetic risk but do not replace professional review or source-document verification. Mailbox actions remain subject to the permissions and confirmations shown in the product.</p><h2>6. Plans and payment</h2><p>Paid plans are billed at the price and currency displayed at checkout. Paystack processes payment details. Plan capacity and AI limits apply. Taxes, where applicable, are the customer’s responsibility unless shown otherwise.</p><h2>7. Suspension and termination</h2><p>We may restrict access for security threats, non-payment, unlawful use, or material breach. You may stop using the service. Company deletion is irreversible and should be exported or reviewed first.</p><h2>8. Availability, warranties and liability</h2><p>The service is provided with reasonable care but without a guarantee of uninterrupted availability or error-free AI output. To the extent permitted by law, indirect or consequential losses are excluded. Nothing in these terms excludes liability or consumer rights that cannot lawfully be excluded.</p><h2>9. Governing law</h2><p>These terms are governed by the laws of Ghana. The parties should first try to resolve disputes in good faith before using the courts or another agreed lawful process.</p>`},
cookies:{title:'Cookie Policy',intro:'Buinee currently uses essential browser storage needed to sign in, protect sessions, and remember interface choices.',body:`<h2>1. What we use</h2><p>Buinee sets essential session cookies for company users and separate Command Center administrators. They are HttpOnly and SameSite=Lax so browser scripts cannot read them and cross-site requests are restricted. The interface may also use local storage to remember theme, dashboard view, chat conversation selection, and other device preferences.</p><h2>2. Third-party checkout and connections</h2><p>When you choose Paystack Checkout or sign in to Microsoft or Google, those providers may set their own cookies under their policies. Buinee does not control cookies on their domains.</p><h2>3. Analytics and advertising</h2><p>Buinee does not currently use advertising cookies or non-essential analytics cookies. If that changes, this policy and any required consent controls will be updated before those technologies are enabled.</p><h2>4. Your controls</h2><p>You can block or delete cookies in your browser, but blocking essential session cookies will prevent sign-in and authenticated features from working. Clearing local storage resets device preferences but does not delete server-side account data.</p>`},
refunds:{title:'Refund Policy',intro:'This policy explains how payment mistakes, cancellations, and refund requests are handled.',body:`<div class="notice">This policy does not limit rights or remedies that cannot lawfully be excluded under Ghanaian law.</div><h2>1. Before payment</h2><p>The current plan, amount, and currency are displayed before Paystack Checkout. Use test mode during setup and confirm the selected company plan before paying.</p><h2>2. Duplicate or incorrect charges</h2><p>Report a duplicate charge, incorrect amount, or payment applied to the wrong company promptly through <a href="https://princecaleb.dev">princecaleb.dev</a>, including the Paystack reference. Verified billing errors will be corrected or refunded as appropriate.</p><h2>3. Subscription cancellations</h2><p>Cancellation normally prevents future renewal and does not automatically refund a billing period already started or service already delivered. If a service failure materially prevented use, submit the dates and details for review.</p><h2>4. Processing</h2><p>Approved refunds are returned through the original payment method where practicable. Bank and payment-network processing times are outside Buinee’s control. A refund is not complete until confirmed by the payment provider.</p><h2>5. Chargebacks</h2><p>Contact us first so the transaction can be investigated. Fraudulent or abusive chargebacks may result in account restriction, without affecting legitimate dispute rights.</p>`},
security:{title:'Security',intro:'How Buinee protects company workspaces, connected mailboxes, payments, and account access.',body:`<h2>1. Core controls</h2><ul><li>Company-scoped database queries and role-based access for preparers, approvers, Supervisors, and Command Center administrators.</li><li>Salted, stretched password hashes and revocable server-side sessions.</li><li>Encrypted mailbox credentials using a key held outside the database.</li><li>OAuth state validation, expiry, single use, and refresh-token handling.</li><li>Paystack webhook HMAC-SHA512 validation and exact amount/currency checks.</li><li>Append-only approval activity records and restricted administrative routes.</li></ul><h2>2. Payment security</h2><p>Card entry occurs on Paystack-hosted Checkout. Buinee stores only safe transaction and masked authorization metadata needed for support and reconciliation—never a full card number, CVV, or Paystack secret key.</p><h2>3. Your part</h2><p>Use unique passwords, restrict Supervisor access, remove departed users promptly, review connected apps, protect API keys, and report unexpected activity. Do not place secrets in chat, instructions, or uploaded documents.</p><h2>4. Reporting a vulnerability</h2><p>Report suspected vulnerabilities privately through the contact channel at <a href="https://princecaleb.dev">princecaleb.dev</a>. Include reproduction steps and avoid accessing, changing, or retaining other people’s data. Do not publish an unresolved issue before there has been a reasonable opportunity to investigate.</p><h2>5. Incident response</h2><p>We investigate credible reports, contain affected access, preserve relevant evidence, correct the issue, and make legally required notifications. Ghana’s Cybersecurity Act, 2020 (Act 1038) and Data Protection Act, 2012 (Act 843) inform the compliance context.</p>`}}
const key=location.pathname.split('/').pop().replace('.html','')||'privacy',doc=docs[key]||docs.privacy;document.title=`${doc.title} — Buinee`;document.querySelector('meta[name=description]').content=doc.intro;document.querySelector(`[data-doc="${key}"]`)?.classList.add('on');document.getElementById('document').innerHTML=`<span class="eyebrow">Legal & trust</span><h1>${doc.title}</h1><p class="updated">Last updated ${updated}</p><p>${doc.intro}</p>${doc.body}`;
</script></body></html>
