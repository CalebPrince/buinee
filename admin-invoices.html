<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Invoices · Buinee</title><style>:root{--p:#f6f4ef;--s:#fff;--s2:#efece5;--l:#dedad0;--i:#101619;--m:#6a747c;--g:#0e5d57;--gs:#dfece9;--r:#b0301f}*{box-sizing:border-box}body{margin:0;background:var(--p);color:var(--i);font:14px Segoe UI,system-ui}.shell{display:flex;min-height:100vh}.side{width:232px;padding:20px 14px;background:var(--s);border-right:1px solid var(--l)}.brand{display:block;padding:8px;color:var(--i);font:600 20px Georgia;text-decoration:none}.brand small{display:block;color:var(--g);font:800 10px Segoe UI;text-transform:uppercase}.nav{display:grid;margin-top:20px}.nav a{padding:10px 12px;border-radius:9px;color:#3c4750;font-weight:650;text-decoration:none}.nav a:hover,.on{background:var(--gs);color:var(--g)!important}main{flex:1;padding:38px}.wrap{max-width:1200px;margin:auto}.head{display:flex;justify-content:space-between}.eye{color:var(--g);font-size:11px;font-weight:800;text-transform:uppercase}h1{font:600 30px Georgia;margin:5px 0}.btn,input,select,textarea{padding:9px;border:1px solid var(--l);border-radius:8px;background:var(--s);font:inherit}.btn{cursor:pointer;font-weight:700}.primary{background:var(--g);color:#fff}.form{display:none;margin:18px 0;padding:18px;border:1px solid var(--l);border-radius:13px;background:var(--s)}.form.open{display:block}.fields{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.fields input,.fields select,.fields textarea{width:100%}.wide{grid-column:1/-1}.items{margin:10px 0}.line{display:grid;grid-template-columns:1fr 90px 140px 40px;gap:7px;margin-bottom:7px}.card{margin-top:18px;border:1px solid var(--l);border-radius:13px;background:var(--s);overflow:hidden}.row{display:grid;grid-template-columns:1fr 1fr 150px 130px 150px;gap:12px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--l)}.row:last-child{border:0}.row small{display:block;color:var(--m)}.money{font:bold 13px Consolas}.status{width:100%;text-transform:capitalize}.empty{padding:40px;text-align:center;color:var(--m)}@media(max-width:800px){.side{width:74px}.brand{font-size:0}.brand:before{content:'B';font-size:20px}.brand small,.nav a{font-size:0}.nav a:before{content:'•';font-size:18px}main{padding:24px 14px}.fields,.row{grid-template-columns:1fr}.line{grid-template-columns:1fr 70px 100px 35px}}</style></head><body><div class="shell"><aside class="side"><a class="brand" href="/admin.html">Buinee<small>Command Center</small></a><nav class="nav"><a href="/admin.html">Overview</a><a href="/admin-reports.html">Reports</a><a href="/admin-inbox.html">Inbox</a><a href="/admin-companies.html">Companies</a><a href="/admin-payments.html">Payments</a><a class="on" href="/admin-invoices.html">Invoices</a><a href="/admin-activity.html">Activity log</a><a href="/admin-errors.html">Error logs</a><a href="/" target="_blank">View site</a></nav></aside><main><div class="wrap"><header class="head"><div><div class="eye">Accounts receivable</div><h1>Invoices</h1></div><button class="btn primary" onclick="formBox.classList.toggle('open')">New invoice</button></header><form class="form" id="formBox"><div class="fields"><select name="company_id" id="company" required></select><input name="customer_name" placeholder="Customer name" required><input name="customer_email" type="email" placeholder="Customer email"><select name="currency"><option>GHS</option><option>USD</option><option>GBP</option><option>EUR</option></select><input name="invoice_number" placeholder="Invoice number (auto if blank)"><input name="issue_date" type="date" required><input name="due_date" type="date"><textarea class="wide" name="notes" placeholder="Notes shown on invoice"></textarea></div><h3>Line items</h3><div class="items" id="lines"></div><button type="button" class="btn" onclick="addLine()">+ Add line item</button> <button class="btn primary">Save invoice</button><span id="msg"></span></form><section class="card" id="list"><div class="empty">Loading invoices…</div></section></div></main></div><script>let data=[];const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function addLine(){lines.insertAdjacentHTML('beforeend','<div class="line"><input placeholder="Description"><input type="number" min=".01" step=".01" value="1"><input type="number" min="0" step=".01" placeholder="Unit amount"><button type="button" class="btn" onclick="this.parentElement.remove()">×</button></div>')}function draw(){list.innerHTML=data.length?data.map(x=>`<article class="row"><div><b>${esc(x.invoice_number)}</b><small>${esc(x.company_name)}</small></div><div><b>${esc(x.customer_name)}</b><small>${esc(x.customer_email)}</small></div><span class="money">${x.currency} ${Number(x.total).toLocaleString(undefined,{minimumFractionDigits:2})}</span><small>${esc(x.issue_date)}${x.due_date?' → '+esc(x.due_date):''}</small><select class="status" onchange="status(${x.id},this.value)">${['draft','sent','paid','void'].map(s=>`<option ${s===x.status?'selected':''}>${s}</option>`).join('')}</select></article>`).join(''):'<div class="empty">No invoices yet. Create the first one when work is ready to bill.</div>'}async function load(){let r=await fetch('/api/admin/invoices',{credentials:'same-origin'});if(r.status===401)return location.href='/admin-login.html';let d=await r.json();data=d.invoices||[];company.innerHTML=(d.companies||[]).map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');draw()}async function status(id,s){await fetch('/api/admin/invoices/status',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({invoice_id:id,status:s})});load()}formBox.onsubmit=async e=>{e.preventDefault();let body=Object.fromEntries(new FormData(formBox));body.items=[...lines.children].map(r=>({description:r.children[0].value,quantity:r.children[1].value,unit_amount:r.children[2].value}));let res=await fetch('/api/admin/invoices/create',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),d=await res.json();msg.textContent=res.ok?'Invoice saved.':d.error;if(res.ok){formBox.reset();lines.innerHTML='';addLine();load()}};formBox.issue_date.value=new Date().toISOString().slice(0,10);addLine();load()</script></body></html>
