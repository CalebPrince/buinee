<meta charset="utf-8">
<title>Contact — Buinee</title>
<meta name="description" content="Get in touch with the Buinee team — email, phone, WhatsApp and social links.">
<script>
  (function () {
    try {
      var saved = localStorage.getItem("buinee-theme");
      var theme = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    } catch (e) {}
    try {
      if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
        document.documentElement.classList.add("anim");
      }
    } catch (e) {}
  })();
</script>
<style>
  :root {
    --paper: #f6f4ef; --surface: #ffffff; --surface-2: #efece5;
    --line: #dedad0; --line-strong: #c9c4b7;
    --ink: #101619; --ink-2: #3c4750; --ink-3: #6a747c; --ink-4: #949ba1;
    --teal: #0e5d57; --teal-deep: #0a4340; --teal-soft: #dfece9;
    --sans: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #0e1315; --surface: #151b1e; --surface-2: #1c2427; --line: #262f33;
      --line-strong: #354046; --ink: #eef1f0; --ink-2: #bcc5c7; --ink-3: #8b9599; --ink-4: #6b7478;
      --teal: #4fb3a6; --teal-deep: #6fcbbd; --teal-soft: #10312e;
    }
  }
  :root[data-theme="dark"] {
    --paper: #0e1315; --surface: #151b1e; --surface-2: #1c2427; --line: #262f33;
    --line-strong: #354046; --ink: #eef1f0; --ink-2: #bcc5c7; --ink-3: #8b9599; --ink-4: #6b7478;
    --teal: #4fb3a6; --teal-deep: #6fcbbd; --teal-soft: #10312e;
  }
  :root[data-theme="light"] {
    --paper: #f6f4ef; --surface: #ffffff; --surface-2: #efece5; --line: #dedad0;
    --line-strong: #c9c4b7; --ink: #101619; --ink-2: #3c4750; --ink-3: #6a747c; --ink-4: #949ba1;
    --teal: #0e5d57; --teal-deep: #0a4340; --teal-soft: #dfece9;
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  h1 { margin: 0; font-weight: 600; letter-spacing: -.02em; }
  p { margin: 0; }
  button { font-family: inherit; font-size: inherit; }
  :focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; border-radius: 4px; }

  .bar { max-width: 720px; margin: 0 auto; padding: 22px 24px 0; display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
  .brand .mark { width: 30px; height: 30px; border-radius: 8px; flex: none; display: grid; place-items: center; background: linear-gradient(140deg, var(--teal), var(--teal-deep)); color: #fff; }
  .brand .mark svg { width: 16px; height: 16px; }
  .brand .name { font-family: var(--serif); font-size: 19px; font-weight: 600; }
  .icobtn {
    width: 36px; height: 36px; border-radius: 9px; border: 1px solid var(--line);
    background: var(--surface); display: grid; place-items: center; color: var(--ink-2); cursor: pointer;
  }
  .icobtn:hover { color: var(--teal); border-color: var(--teal); }
  .icobtn svg { width: 17px; height: 17px; }

  main { max-width: 720px; margin: 0 auto; padding: 44px 24px 70px; }
  .eyebrow { font-size: 11.5px; letter-spacing: .13em; text-transform: uppercase; font-weight: 700; color: var(--teal); }
  h1 { font-family: var(--serif); font-size: clamp(28px, 4vw, 38px); margin: 10px 0 12px; letter-spacing: -.02em; }
  .contact-head p { font-size: 15.5px; color: var(--ink-2); max-width: 50ch; }

  .channel-list { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
  .channel {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px; border: 1px solid var(--line);
    border-radius: 12px; background: var(--surface); text-decoration: none; color: var(--ink);
  }
  .channel:hover { border-color: var(--teal); }
  .channel .ic { width: 38px; height: 38px; border-radius: 10px; background: var(--teal-soft); color: var(--teal); display: grid; place-items: center; flex: none; }
  .channel .ic svg { width: 18px; height: 18px; }
  .channel b { display: block; font-size: 14.5px; }
  .channel span.detail { display: block; font-size: 13px; color: var(--ink-3); margin-top: 2px; }
  .channel[hidden] { display: none; }

  .social-row { display: flex; align-items: center; gap: 8px; margin-top: 28px; }
  .foot-ic {
    width: 36px; height: 36px; border-radius: 9px; border: 1px solid var(--line); background: var(--surface);
    display: grid; place-items: center; color: var(--ink-2);
  }
  .foot-ic:hover { color: var(--teal); border-color: var(--teal); }
  .foot-ic svg { width: 16px; height: 16px; }
  .foot-ic[hidden] { display: none; }

  .auth-legal { padding: 20px; text-align: center; font-size: 12px; }
  .auth-legal a { margin: 0 7px; color: var(--ink-3); }

  /* ---- Scroll-reveal: ease sections in as they enter view ---- */
  html.anim .contact-head,
  html.anim .channel-list > .channel,
  html.anim .social-row {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity .7s cubic-bezier(.16, .8, .3, 1), transform .7s cubic-bezier(.16, .8, .3, 1);
  }
  html.anim .reveal-in { opacity: 1 !important; transform: none !important; }
  @media (prefers-reduced-motion: reduce) {
    html.anim .contact-head,
    html.anim .channel-list > .channel,
    html.anim .social-row { opacity: 1 !important; transform: none !important; transition: none !important; }
  }
</style>

<div class="bar">
  <a class="brand" href="/">
    <span class="mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h11"/></svg></span>
    <span class="name">Buinee</span>
  </a>
  <button class="icobtn" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle theme">
    <svg id="themeIco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</div>

<main>
  <div class="contact-head">
    <span class="eyebrow">{{cms:contact_eyebrow}}</span>
    <h1>{{cms:contact_headline}}</h1>
    <p>{{cms:contact_intro}}</p>
  </div>

  <div class="channel-list" id="channelList">
    <a class="channel" href="mailto:{{cms:contact_email}}" data-empty="mailto:">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="m22 6-10 7L2 6"/></svg></span>
      <div><b>Email</b><span class="detail">{{cms:contact_email}}</span></div>
    </a>
    <a class="channel" href="tel:{{cms:contact_phone}}" data-empty="tel:">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
      <div><b>Phone</b><span class="detail">{{cms:contact_phone}}</span></div>
    </a>
    <a class="channel" href="https://wa.me/{{cms:contact_whatsapp}}" target="_blank" rel="noopener" data-empty="https://wa.me/">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></span>
      <div><b>WhatsApp</b><span class="detail">Message us directly</span></div>
    </a>
    <div class="channel" id="addressChannel">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg></span>
      <div><b>Address</b><span class="detail" id="addressText">{{cms:contact_address}}</span></div>
    </div>
  </div>

  <div class="social-row" id="socialRow">
    <a class="foot-ic" href="{{cms:social_twitter}}" target="_blank" rel="noopener" data-empty="" aria-label="X (Twitter)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4l16 16M20 4 4 20"/></svg></a>
    <a class="foot-ic" href="{{cms:social_linkedin}}" target="_blank" rel="noopener" data-empty="" aria-label="LinkedIn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/><path d="M8 9h4v2a4 4 0 0 1 4-2c3 0 4 2 4 5v7h-4v-6c0-1-.5-2-2-2s-2 1-2 2v6H8z"/></svg></a>
    <a class="foot-ic" href="{{cms:social_facebook}}" target="_blank" rel="noopener" data-empty="" aria-label="Facebook"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9h3V6h-3a3 3 0 0 0-3 3v2H9v3h2v7h3v-7h3l1-3h-4z"/></svg></a>
    <a class="foot-ic" href="{{cms:social_instagram}}" target="_blank" rel="noopener" data-empty="" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg></a>
  </div>
</main>

<footer class="auth-legal"><a href="/privacy">Privacy</a><a href="/terms">Terms</a><a href="/cookies">Cookies</a><a href="/refunds">Refunds</a><a href="/security">Security</a></footer>

<script>
  function toggleTheme() {
    const root = document.documentElement;
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('buinee-theme', next);
    document.getElementById('themeIco').innerHTML = next === 'dark'
      ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
      : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  }
  if (document.documentElement.getAttribute('data-theme') === 'dark') {
    document.getElementById('themeIco').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }

  document.querySelectorAll('#channelList .channel[data-empty]').forEach(a => {
    if (a.getAttribute('href') === a.dataset.empty) a.hidden = true;
  });
  const addressText = document.getElementById('addressText').textContent.trim();
  if (!addressText) document.getElementById('addressChannel').hidden = true;
  document.querySelectorAll('#socialRow .foot-ic').forEach(a => {
    if (a.getAttribute('href') === a.dataset.empty) a.hidden = true;
  });

  // ---- Scroll-reveal: ease sections in as they scroll into view ----
  (function initReveal() {
    if (!document.documentElement.classList.contains('anim')) return;
    const targets = [...document.querySelectorAll('.contact-head, .channel-list > .channel, .social-row')];
    if (!targets.length) return;
    const seen = new Map();
    targets.forEach(el => {
      const i = seen.get(el.parentNode) || 0;
      seen.set(el.parentNode, i + 1);
      el.style.transitionDelay = Math.min(i * 90, 360) + 'ms';
    });
    const reveal = el => el.classList.add('reveal-in');
    if (!('IntersectionObserver' in window)) { targets.forEach(reveal); return; }
    const io = new IntersectionObserver((entries, obs) => {
      entries.forEach(e => { if (e.isIntersecting) { reveal(e.target); obs.unobserve(e.target); } });
    }, { rootMargin: '0px 0px -8% 0px', threshold: 0.12 });
    targets.forEach(el => io.observe(el));
    setTimeout(() => targets.forEach(reveal), 4000);
  })();
</script>
